<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foxsir · 欲研所</title>
    <link rel="icon" href="/assets/images/OIP-C.jpg" type="image/jpeg" />
    <!-- ===== R-02 等级样式 ===== -->
    <link rel="stylesheet" href="/assets/css/level.css" />
    <!-- ===== R-05 头像样式 ===== -->
    <link rel="stylesheet" href="/assets/css/avatar.css" />
    <style>
      /* ============================================================
         1. 全局重置 & 基础
         ============================================================ */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #0f0e17;
        color: #fffffe;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        /* ===== 全局泛光：新增金色径向渐变 + 原有渐变 ===== */
        background-image:
          radial-gradient(ellipse at 50% 45%, rgba(212, 165, 116, 0.08) 0%, transparent 60%),
          radial-gradient(ellipse at 20% 50%, rgba(212, 165, 116, 0.06) 0%, transparent 60%),
          radial-gradient(ellipse at 80% 20%, rgba(212, 165, 116, 0.04) 0%, transparent 50%),
          radial-gradient(ellipse at 50% 80%, rgba(26, 26, 46, 0.8) 0%, transparent 70%);
        background-attachment: fixed;
      }
      body::before {
        content: '';
        position: fixed;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(
          circle at 30% 40%,
          rgba(212, 165, 116, 0.03) 0%,
          transparent 60%
        );
        pointer-events: none;
        z-index: 0;
        animation: ambientGlow 20s ease-in-out infinite alternate;
      }
      @keyframes ambientGlow {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(5%, 3%) scale(1.1);
        }
      }
      .app-container {
        position: relative;
        z-index: 1;
        max-width: 1200px;
        width: 100%;
        margin: 0 auto;
        padding: 32px 40px 48px;
        background: rgba(15, 14, 23, 0.70);
        backdrop-filter: blur(24px) saturate(1.4);
        -webkit-backdrop-filter: blur(24px) saturate(1.4);
        border-radius: 48px;
        border: 1px solid rgba(212, 165, 116, 0.12);
        box-shadow:
          0 0 80px rgba(212, 165, 116, 0.03),
          0 40px 80px rgba(0, 0, 0, 0.6),
          inset 0 1px 0 rgba(255, 255, 255, 0.03);
        transition: box-shadow 0.4s ease;
      }

      /* ============================================================
         2. 顶栏：Logo + 用户信息
         ============================================================ */
      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 18px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        margin-bottom: 24px;
        flex-wrap: wrap;
        gap: 8px 16px;
      }
      .top-bar .logo-area {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }
      .top-bar .logo-icon {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        overflow: hidden;
        flex-shrink: 0;
        background: #1a1a2e;
        border: 1px solid rgba(212, 165, 116, 0.15);
        box-shadow: 0 4px 20px rgba(212, 165, 116, 0.1);
      }
      .top-bar .logo-icon img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .top-bar .brand-text h1 {
        font-family: 'Georgia', 'Times New Roman', serif;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 2px;
        background: linear-gradient(135deg, #f5d6a8 0%, #d4a574 60%, #b8946a 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.2;
      }
      .top-bar .brand-text .tagline {
        font-size: 10px;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.12);
        font-weight: 400;
        -webkit-text-fill-color: rgba(255, 255, 255, 0.12);
      }

      /* ---- 顶栏右侧：用户信息 ---- */
      .top-bar .user-info-bar {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .top-bar .user-info-bar .avatar-wrapper {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        overflow: hidden;
        flex-shrink: 0;
        border: 1px solid rgba(212, 165, 116, 0.1);
        background: #1a1a2e;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: border-color 0.3s ease;
        position: relative;
      }
      .top-bar .user-info-bar .avatar-wrapper:hover {
        border-color: rgba(212, 165, 116, 0.3);
      }
      .top-bar .user-info-bar .avatar-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .top-bar .user-info-bar .avatar-wrapper .avatar-letter {
        font-size: 14px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.25);
      }
      .top-bar .user-info-bar .uname {
        font-weight: 500;
        font-size: 14px;
        color: #fffffe;
        white-space: nowrap;
      }
      .top-bar .user-info-bar .level-title {
        font-size: 11px;
        color: #d4a574;
        background: rgba(212, 165, 116, 0.12);
        padding: 1px 10px;
        border-radius: 20px;
        border: 1px solid rgba(212, 165, 116, 0.18);
        white-space: nowrap;
      }
      .top-bar .user-info-bar .no-identity {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.12);
        white-space: nowrap;
      }
      .top-bar .user-info-bar .btn {
        padding: 3px 12px;
        font-size: 11px;
        border-radius: 30px;
        border: none;
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        text-decoration: none;
        font-family: inherit;
        font-weight: 500;
        white-space: nowrap;
      }
      .top-bar .user-info-bar .btn-secondary {
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.04);
      }
      .top-bar .user-info-bar .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #fffffe;
      }
      .top-bar .user-info-bar .btn-danger {
        background: rgba(239, 68, 68, 0.08);
        color: #f87171;
        border: 1px solid rgba(239, 68, 68, 0.06);
      }
      .top-bar .user-info-bar .btn-danger:hover {
        background: rgba(239, 68, 68, 0.16);
      }
      .top-bar .user-info-bar .guest-label {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.15);
      }

      /* ============================================================
         3. 欢迎卡片 —— 左侧文字 + 右侧图片（渐变过渡）
         ============================================================ */
      .welcome-card {
        display: flex;
        flex-direction: row;
        border-radius: 24px;
        overflow: hidden;
        margin-bottom: 32px;
        min-height: 180px;
        background: rgba(15, 14, 23, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: border-color 0.3s ease, box-shadow 0.3s ease;
      }
      .welcome-card:hover {
        border-color: rgba(212, 165, 116, 0.10);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      /* 左栏：文字 */
      .welcome-card .welcome-text {
        flex: 1.2;
        padding: 44px 48px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background: transparent;
      }
      .welcome-card .welcome-text .greeting {
        font-size: 22px;
        font-weight: 600;
        color: #e8e0d8;
        margin-bottom: 6px;
        letter-spacing: 0.5px;
      }
      .welcome-card .welcome-text .greeting .highlight {
        color: #d4a574;
      }
      .welcome-card .welcome-text .desc {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.80);
        line-height: 1.7;
        max-width: 520px;
        margin-bottom: 18px;
      }
      .welcome-card .welcome-text .btn-about {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 28px;
        border-radius: 40px;
        background: rgba(212, 165, 116, 0.10);
        color: #d4a574;
        border: 1px solid rgba(212, 165, 116, 0.12);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.3s ease;
        font-family: inherit;
        cursor: pointer;
        align-self: flex-start;
      }
      .welcome-card .welcome-text .btn-about:hover {
        background: rgba(212, 165, 116, 0.18);
        border-color: rgba(212, 165, 116, 0.25);
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(212, 165, 116, 0.08);
      }
      .welcome-card .welcome-text .btn-about .arrow {
        display: inline-block;
        transition: transform 0.3s ease;
      }
      .welcome-card .welcome-text .btn-about:hover .arrow {
        transform: translateX(5px);
      }

      /* 右栏：图片 + 渐变遮罩（从左到右融合） */
      .welcome-card .welcome-image {
        flex: 1;
        background-image:
          linear-gradient(to right, rgba(15, 14, 23, 0.85) 0%, transparent 45%, transparent 100%),
          url('/assets/images/OIP-B.jpg');
        background-size: 100% 100%, cover;
        background-position: center;
        background-repeat: no-repeat;
        min-height: 180px;
        transition: filter 0.3s ease;
      }
      .welcome-card:hover .welcome-image {
        filter: brightness(1.02) saturate(1.02);
      }

      /* ============================================================
         4. 项目探索
         ============================================================ */
      .projects-section {
        margin-top: 6px;
      }
      .projects-section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 18px;
        flex-wrap: wrap;
        gap: 8px;
      }
      .projects-section-header::before,
      .projects-section-header::after {
        content: "◆";
        color: rgba(212, 165, 116, 0.35);
        font-size: 14px;
      }
      .projects-section-header h2 {
        font-family: 'Georgia', 'Times New Roman', serif;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 1px;
        color: #fffffe;
      }
      .projects-section-header .subtitle {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.15);
        letter-spacing: 1px;
      }

      /* PC 三列卡片 */
      .project-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
      }
      .project-card {
        background: rgba(255, 255, 255, 0.02);
        border-radius: 18px;
        padding: 22px 18px 18px;
        border: 1px solid rgba(255, 255, 255, 0.04);
        transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        position: relative;
        overflow: hidden;
        text-decoration: none;
        color: inherit;
      }
      .project-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, rgba(212, 165, 116, 0.03), transparent 60%);
        opacity: 0;
        transition: opacity 0.4s ease;
        pointer-events: none;
      }
      .project-card:hover {
        transform: translateY(-4px);
        border-color: rgba(212, 165, 116, 0.12);
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
      }
      .project-card:hover::before {
        opacity: 1;
      }
      .project-card .icon-wrap {
        font-size: 26px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: rgba(212, 165, 116, 0.06);
        border: 1px solid rgba(212, 165, 116, 0.04);
        flex-shrink: 0;
      }
      .project-card h3 {
        font-size: 15px;
        font-weight: 500;
        color: #fffffe;
        margin: 0 0 2px;
        letter-spacing: 0.3px;
      }
      .project-card p {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.25);
        line-height: 1.5;
        margin: 0 0 12px;
        flex: 1;
      }
      .project-card .enter-hint {
        font-size: 11px;
        color: #d4a574;
        display: flex;
        align-items: center;
        gap: 4px;
        transition: color 0.3s ease;
        margin-top: auto;
      }
      .project-card:hover .enter-hint {
        color: rgba(212, 165, 116, 0.8);
      }
      .project-card .enter-hint::after {
        content: '→';
        transition: transform 0.3s ease;
      }
      .project-card:hover .enter-hint::after {
        transform: translateX(4px);
      }
      .project-card .status-tag {
        position: absolute;
        top: 14px;
        right: 14px;
        font-size: 9px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 1px 8px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.1);
      }
      .project-card .status-tag.maintenance {
        background: rgba(245, 158, 11, 0.1);
        color: #f59e0b;
      }
      .project-card .status-tag.offline {
        background: rgba(239, 68, 68, 0.06);
        color: #ef4444;
      }
      .project-card.disabled {
        opacity: 0.4;
        cursor: not-allowed;
        pointer-events: none;
      }
      .project-card.disabled:hover {
        transform: none;
        border-color: rgba(255, 255, 255, 0.04);
        background: rgba(255, 255, 255, 0.02);
      }

      /* ============================================================
         5. 页脚
         ============================================================ */
      .footer {
        margin-top: 36px;
        padding-top: 18px;
        border-top: 1px solid rgba(255, 255, 255, 0.04);
        text-align: center;
        font-size: 11px;
        color: rgba(212, 165, 116, 0.4);
        letter-spacing: 0.5px;
      }
      .footer span {
        color: rgba(212, 165, 116, 0.6);
      }

      /* ============================================================
         6. Toast
         ============================================================ */
      .toast-container {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 360px;
        width: 100%;
      }
      .toast {
        padding: 12px 20px;
        border-radius: 14px;
        background: rgba(15, 14, 23, 0.9);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        color: #fffffe;
        font-size: 13px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        animation: toastIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        transform-origin: bottom right;
      }
      .toast.error {
        border-color: rgba(239, 68, 68, 0.15);
      }
      .toast.error .toast-icon {
        color: #f87171;
      }
      .toast.success {
        border-color: rgba(34, 197, 94, 0.15);
      }
      .toast.success .toast-icon {
        color: #22c55e;
      }
      @keyframes toastIn {
        from { opacity: 0; transform: translateY(20px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      .toast-out {
        animation: toastOut 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes toastOut {
        from { opacity: 1; transform: translateY(0) scale(1); }
        to { opacity: 0; transform: translateY(20px) scale(0.95); }
      }

      /* ============================================================
         7. 滚动条
         ============================================================ */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.02);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(212, 165, 116, 0.15);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(212, 165, 116, 0.25);
      }

      /* ============================================================
         8. 响应式 · 平板 820px（保持左右结构）
         ============================================================ */
      @media (max-width: 820px) {
        .top-bar {
          flex-direction: column;
          align-items: stretch;
          gap: 8px;
          padding-bottom: 14px;
        }
        .top-bar .user-info-bar {
          justify-content: flex-start;
          gap: 4px;
        }

        .welcome-card {
          flex-direction: row !important;
          min-height: auto;
          border-radius: 20px;
        }
        .welcome-card .welcome-text {
          padding: 28px 30px;
          flex: 1.2;
        }
        .welcome-card .welcome-text .greeting {
          font-size: 20px;
        }
        .welcome-card .welcome-text .desc {
          font-size: 15px;
          max-width: 100%;
        }
        .welcome-card .welcome-image {
          flex: 1;
          min-height: 160px;
          background-image:
            linear-gradient(to right, rgba(15, 14, 23, 0.80) 0%, transparent 40%, transparent 100%),
            url('/assets/images/OIP-B.jpg');
          background-size: 100% 100%, cover;
          background-position: center;
          border-radius: 0;
        }

        .project-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 10px;
        }
        .project-card {
          padding: 16px 14px 14px;
        }
        .project-card .icon-wrap {
          width: 36px;
          height: 36px;
          font-size: 22px;
        }
      }

      /* ============================================================
         9. 响应式 · 手机 ≤480px（左右结构 + 紧凑适配）
         ============================================================ */
      @media (max-width: 480px) {
        .app-container {
          padding: 14px;
          border-radius: 24px;
        }
        .top-bar .brand-text h1 {
          font-size: 20px;
        }
        .top-bar .logo-icon {
          width: 38px;
          height: 38px;
        }
        .top-bar .user-info-bar .avatar-wrapper {
          width: 30px;
          height: 30px;
        }
        .top-bar .user-info-bar .uname {
          font-size: 12px;
        }
        .top-bar .user-info-bar .level-title {
          font-size: 10px;
          padding: 0 8px;
        }
        .top-bar .user-info-bar .btn {
          font-size: 10px;
          padding: 2px 10px;
        }

        .welcome-card {
          flex-direction: row !important;
          border-radius: 16px;
          margin-bottom: 20px;
          min-height: 130px;
        }
        .welcome-card .welcome-text {
          padding: 16px 14px 16px 18px;
          flex: 1.4;
        }
        .welcome-card .welcome-text .greeting {
          font-size: 15px;
          margin-bottom: 4px;
        }
        .welcome-card .welcome-text .desc {
          font-size: 12px;
          color: rgba(255, 255, 255, 0.82);
          margin-bottom: 10px;
          line-height: 1.6;
          max-width: 100%;
        }
        .welcome-card .welcome-text .btn-about {
          font-size: 11px;
          padding: 6px 16px;
          gap: 4px;
        }
        .welcome-card .welcome-image {
          flex: 0 0 38%;
          min-height: 130px;
          background-image:
            linear-gradient(to right, rgba(15, 14, 23, 0.80) 0%, transparent 35%, transparent 100%),
            url('/assets/images/OIP-B.jpg');
          background-size: 100% 100%, cover;
          background-position: center;
          border-radius: 0;
        }

        .project-grid {
          display: flex;
          flex-direction: column;
          gap: 12px;
          grid-template-columns: unset;
        }
        .project-card {
          flex-direction: row !important;
          align-items: center;
          padding: 16px 18px;
          gap: 14px;
          border-radius: 16px;
        }
        .project-card .icon-wrap {
          width: 44px;
          height: 44px;
          flex-shrink: 0;
          margin-bottom: 0;
          font-size: 24px;
        }
        .project-card .text-group {
          flex: 1;
        }
        .project-card h3 {
          font-size: 15px;
          margin: 0 0 3px;
        }
        .project-card p {
          font-size: 12px;
          margin: 0;
          color: rgba(255, 255, 255, 0.3);
        }
        .project-card .enter-hint {
          margin-top: 0;
          font-size: 18px;
          color: #d4a574;
        }
        .project-card .status-tag {
          top: 10px;
          right: 12px;
          font-size: 8px;
          padding: 0 6px;
        }
        .projects-section-header::before,
        .projects-section-header::after {
          font-size: 11px;
        }
      }
    </style>
  </head>
  <body>
    <!-- ============================================================
    Phase 1: 全局 Loading（最优先执行）
    ============================================================ -->
    <script type="module">
      import { showLoading, hideLoading, updateLoadingText } from '@/js/loading.js';

      showLoading('唤醒欲研所', '连接安全通道…');
      setTimeout(() => updateLoadingText('正在准备庄园', '加载你的专属空间'), 1500);
      window.addEventListener('load', () => setTimeout(() => hideLoading(false), 300));
      setTimeout(() => updateLoadingText('加载中，请稍候', '网络较慢时可能需要多等一会'), 5000);
    </script>

    <!-- ===== R-01 路由守卫 ===== -->
    <script type="module">
      import { initGuard } from '@/js/guard.js';
      initGuard();
    </script>

    <div class="app-container">
      <!-- ============================================================
      顶栏：Logo（左）+ 用户信息（右）
      ============================================================ -->
      <header class="top-bar">
        <div class="logo-area">
          <div class="logo-icon">
            <img src="/assets/images/OIP-C.jpg" alt="Foxsir Logo" />
          </div>
          <div class="brand-text">
            <h1>Foxsir</h1>
            <div class="tagline">BDSM · 安全 · 尊重 · 共识</div>
          </div>
        </div>
        <!-- 用户信息由 JS 渲染 -->
        <div class="user-info-bar" id="topUserInfo"></div>
      </header>

      <!-- ============================================================
      欢迎卡片 —— 左侧文字 + 右侧图片（渐变过渡）
      ============================================================ -->
      <section class="welcome-card">
        <div class="welcome-text">
          <div class="greeting">
          欢迎来到 <span class="highlight">Foxsir · 欲研所</span>
          </div>
          <div class="desc">
            这里是 BDSM 爱好者的私密乐园<br />
            我们将在这探索、学习、认识、交流<br />
            <span style="display: inline-block; padding-left: 2em;">——不过这一切都要从了解规则开始</span>
          </div>
          <a href="/about.html" class="btn-about">
            📖 了解规则 <span class="arrow">→</span>
          </a>
        </div>
        <div class="welcome-image" role="img" aria-label="Foxsir 庄园背景"></div>
      </section>

      <!-- ============================================================
      项目探索
      ============================================================ -->
      <section class="projects-section">
        <div class="projects-section-header">
          <h2>🚀 探索</h2>
          <span class="subtitle">SELECT YOUR PATH</span>
        </div>
        <div class="project-grid" id="projectGrid"></div>
      </section>

      <!-- ============================================================
      页脚
      ============================================================ -->
      <div class="footer"><span>✦</span> 以安全、尊重、共识为核心 <span>✦</span></div>
    </div>

    <!-- ============================================================
    Toast 容器
    ============================================================ -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ============================================================
    Import Map & 主脚本
    ============================================================ -->
    <script type="importmap">
      {
        "imports": {
          "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
        }
      }
    </script>

    <script type="module">
      // ===== 核心模块导入 =====
      import { signOut, getCurrentUser, getUserIdentity } from '@/js/auth.js';
      import { getUserRole } from '@/js/identity.js';
      import { getVisibleProjects } from '@/js/registry.js';
      import { calculateLevel, getLevelBadge, getLevelProgressBar, formatPoints } from '@/js/level.js';
      import { uploadAvatar } from '@/js/avatar.js';

      const topUserInfo = document.getElementById('topUserInfo');
      const projectGrid = document.getElementById('projectGrid');
      const toastContainer = document.getElementById('toastContainer');

      const ROLE_MAP = {
        guest: '访客',
        self: '普通用户',
        verified: '认证用户',
        subadmin: '次级管理',
        admin: '根源管理',
      };

      function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<span class="toast-icon">${type === 'error' ? '✕' : '✓'}</span> ${message}`;
        toastContainer.appendChild(toast);
        setTimeout(() => {
          toast.classList.add('toast-out');
          setTimeout(() => toast.remove(), 300);
        }, 2800);
      }

      function getDisplayName(user) {
        if (!user) return null;
        const nickname = user.user_metadata?.nickname;
        if (nickname && nickname.trim()) return nickname.trim();
        return user.email;
      }

      function getAvatarLetter(user) {
        const name = getDisplayName(user);
        if (!name) return '👤';
        const first = name.charAt(0).toUpperCase();
        if (/[A-Za-z]/.test(first)) return first;
        return '👤';
      }

      function isMobileScreen() {
        return window.innerWidth <= 480;
      }

      // ============================================================
      // 渲染顶栏用户信息
      // ============================================================
      async function renderTopUser() {
        const user = await getCurrentUser();
        const role = await getUserRole();

        if (!user) {
          topUserInfo.innerHTML = `
            <span class="guest-label">👤 未登录</span>
          `;
          return;
        }

        const identity = await getUserIdentity();
        const displayName = getDisplayName(user);
        const userId = user.id;

        const avatarUrl = identity?.avatarUrl || null;
        const avatarLetter = getAvatarLetter(user);
        let avatarHtml = '';
        if (avatarUrl) {
          avatarHtml = `<img src="${avatarUrl}" alt="${displayName}" />`;
        } else {
          avatarHtml = `<span class="avatar-letter">${avatarLetter}</span>`;
        }

        let levelTitleHtml = '';
        if (identity && identity.primaryId) {
          const points = user.user_metadata?.points ?? 0;
          const levelInfo = calculateLevel(identity.primaryId, points);
          levelTitleHtml = `<span class="level-title">${levelInfo.title}</span>`;
        } else {
          levelTitleHtml = `<span class="no-identity">—</span>`;
        }

        const isAdmin = ['admin', 'subadmin'].includes(role);
        const adminBtn = isAdmin
          ? `<a href="/admin.html" class="btn btn-secondary">⚙️ 管理</a>`
          : '';

        topUserInfo.innerHTML = `
          <div class="avatar-wrapper" id="topAvatarWrapper">
            ${avatarHtml}
            <input type="file" id="topAvatarInput" accept="image/*" style="display:none;" />
          </div>
          <span class="uname">${displayName}</span>
          ${levelTitleHtml}
          ${adminBtn}
          <button id="topLogoutBtn" class="btn btn-danger">登出</button>
        `;

        // 头像上传
        const avatarWrapper = document.getElementById('topAvatarWrapper');
        const avatarInput = document.getElementById('topAvatarInput');
        if (avatarWrapper && avatarInput) {
          avatarWrapper.addEventListener('click', () => {
            avatarInput.click();
          });
          avatarInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
              showToast('请选择图片文件', 'error');
              avatarInput.value = '';
              return;
            }
            if (file.size > 5 * 1024 * 1024) {
              showToast('图片大小请勿超过 5MB', 'error');
              avatarInput.value = '';
              return;
            }
            try {
              showToast('上传中...', 'info');
              const result = await uploadAvatar(file, userId);
              if (result.error) {
                showToast('上传失败: ' + result.error.message, 'error');
              } else {
                showToast('头像更新成功 🎉', 'success');
                setTimeout(() => renderAll(), 300);
              }
            } catch (err) {
              showToast('上传异常: ' + err.message, 'error');
            } finally {
              avatarInput.value = '';
            }
          });
        }

        document.getElementById('topLogoutBtn')?.addEventListener('click', async () => {
          await signOut();
        });
      }

      // ============================================================
      // 渲染项目
      // ============================================================
      async function renderProjects() {
        const role = await getUserRole();
        const visible = getVisibleProjects(role);
        const mobile = isMobileScreen();

        if (visible.length === 0) {
          projectGrid.innerHTML = `<p style="color:rgba(255,255,255,0.2);grid-column:1/-1;text-align:center;padding:40px 0;">暂无可用项目</p>`;
          return;
        }

        if (mobile) {
          projectGrid.innerHTML = visible.map(project => {
            const statusClass = project.status === 'maintenance' ? 'maintenance' : '';
            const disabled = project.status === 'offline' || project.status === 'maintenance';
            return `
              <a href="${project.url}" class="project-card ${disabled ? 'disabled' : ''}">
                ${project.status === 'maintenance' ? `<span class="status-tag ${statusClass}">维护中</span>` : ''}
                <div class="icon-wrap">${project.icon || '📦'}</div>
                <div class="text-group">
                  <h3>${project.name}</h3>
                  <p>${project.description}</p>
                </div>
                <span class="enter-hint">${disabled ? '暂不可用' : '>'}</span>
              </a>
            `;
          }).join('');
        } else {
          projectGrid.innerHTML = visible.map(project => {
            const statusClass = project.status === 'maintenance' ? 'maintenance' : '';
            const disabled = project.status === 'offline' || project.status === 'maintenance';
            return `
              <a href="${project.url}" class="project-card ${disabled ? 'disabled' : ''}">
                <span class="status-tag ${statusClass}">${project.status === 'maintenance' ? '维护中' : ''}</span>
                <div class="icon-wrap">${project.icon || '📦'}</div>
                <h3>${project.name}</h3>
                <p>${project.description}</p>
                <span class="enter-hint">${disabled ? '暂不可用' : '进入'}</span>
              </a>
            `;
          }).join('');
        }
      }

      // ============================================================
      // 渲染全部（带超时兜底）
      // ============================================================
      async function renderAll() {
        try {
          await Promise.race([
            Promise.all([renderTopUser(), renderProjects()]),
            new Promise((_, reject) => setTimeout(() => reject(new Error('数据加载超时')), 8000))
          ]);
        } catch (err) {
          console.warn('renderAll 超时或失败:', err);
          // 不阻塞界面，已渲染的部分保留
        }
      }

      window.addEventListener('resize', () => renderProjects());

      import { onAuthStateChange } from '@/js/auth.js';
      onAuthStateChange(() => renderAll());

      renderAll();
      window.showToast = showToast;
    </script>
  </body>
</html>
