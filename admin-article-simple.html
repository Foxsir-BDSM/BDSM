<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易内容管理 · Foxsir</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css">
    <style>
        body { background: #0f0e17 !important; color: #fffffe !important; font-family: 'Inter', sans-serif; padding: 30px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { font-size: 28px; margin-bottom: 20px; color: #fffffe !important; }
        .panel { background: rgba(255,255,255,0.02) !important; border-radius: 18px; padding: 24px; border: 1px solid rgba(255,255,255,0.04) !important; margin-bottom: 24px; }
        .panel h2 { font-size: 16px; color: rgba(255,255,255,0.3) !important; margin-bottom: 16px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; color: rgba(255,255,255,0.2) !important; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.04); background: rgba(255,255,255,0.02); color: #fffffe !important; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: rgba(212,165,116,0.2); }
        .form-group input::placeholder { color: rgba(255,255,255,0.1) !important; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn { padding: 12px 32px; border-radius: 30px; border: none; font-weight: 500; cursor: pointer; font-family: inherit; font-size: 15px; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #d4a574, #b8946a); color: #0f0e17; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(212,165,116,0.2); }
        .btn-secondary { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.3); }
        .btn-secondary:hover { background: rgba(255,255,255,0.08); }
        #statusMsg { margin-top: 12px; padding: 10px 16px; border-radius: 10px; font-size: 13px; display: none; }
        #statusMsg.success { display: block; background: rgba(34,197,94,0.06); color: #22c55e; border: 1px solid rgba(34,197,94,0.06); }
        #statusMsg.error { display: block; background: rgba(239,68,68,0.06); color: #f87171; border: 1px solid rgba(239,68,68,0.06); }
        #statusMsg.loading { display: block; background: rgba(212,165,116,0.06); color: #d4a574; border: 1px solid rgba(212,165,116,0.06); }
        .target-tabs { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .target-tabs .tab { padding: 8px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.04); background: transparent; color: rgba(255,255,255,0.2); cursor: pointer; transition: all 0.3s; font-family: inherit; font-size: 14px; }
        .target-tabs .tab.active { border-color: rgba(212,165,116,0.2); background: rgba(212,165,116,0.06); color: #d4a574; }
        .list-item { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.02); display: flex; justify-content: space-between; align-items: center; }
        .list-item span { color: rgba(255,255,255,0.6) !important; }
        .list-item .date { font-size: 11px; color: rgba(255,255,255,0.1) !important; }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
        .token-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .token-row input { flex: 1; min-width: 200px; padding: 10px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.04); background: rgba(255,255,255,0.02); color: #fffffe; font-size: 14px; font-family: monospace; }
        .token-status { font-size: 12px; }
        .token-status.ok { color: #22c55e; }
        .token-status.fail { color: #f87171; }
        .hint { font-size: 12px; color: rgba(255,255,255,0.1) !important; margin-top: 6px; }
        #editorTextarea { display: none; }
        .EasyMDEContainer { border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.04); }
        .EasyMDEContainer .CodeMirror { background: rgba(255,255,255,0.02); min-height: 300px; color: #d4d0c8; }
        .EasyMDEContainer .editor-toolbar { background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.04); }
        .EasyMDEContainer .editor-toolbar button { color: rgba(255,255,255,0.3); }
        .EasyMDEContainer .editor-toolbar button:hover { background: rgba(212,165,116,0.06); color: #d4a574; }
        .EasyMDEContainer .editor-preview { background: rgba(255,255,255,0.02); color: #d4d0c8; }

        .CodeMirror-selected { background: rgba(212,165,116,0.35) !important; }
        .CodeMirror .CodeMirror-cursor { border-left: 2px solid #d4a574 !important; }
        .CodeMirror .CodeMirror-matchingbracket { color: #d4a574 !important; background: transparent !important; }
        .editor-preview { background: #0f0e17 !important; color: #d4d0c8 !important; }
        .editor-preview * { color: #d4d0c8 !important; }
        .CodeMirror { background: rgba(255,255,255,0.02) !important; color: #d4d0c8 !important; }
        .CodeMirror-gutters { background: rgba(255,255,255,0.02) !important; border-right: 1px solid rgba(255,255,255,0.04) !important; }

        select {
            background: rgba(255,255,255,0.02) !important;
            color: #fffffe !important;
            border: 1px solid rgba(255,255,255,0.04) !important;
        }
        select option {
            background: #1a1a1a !important;
            color: #fffffe !important;
        }
        select:focus {
            outline: none;
            border-color: rgba(212,165,116,0.2) !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 简易内容管理</h1>

    <div class="panel">
        <div class="token-row">
            <input type="password" id="tokenInput" placeholder="GitHub Token" value="">
            <button class="btn btn-secondary" id="saveTokenBtn">保存</button>
            <span id="tokenStatus" class="token-status ok">✅ 已配置</span>
        </div>
        <div class="hint">💡 请从 Vercel 环境变量或手动输入 Token。</div>
    </div>

    <div class="panel">
        <h2>✏️ 发布内容</h2>
        <div class="target-tabs">
            <button class="tab active" data-target="knowledge">📚 知识区</button>
            <button class="tab" data-target="tasks">🎯 任务区</button>
        </div>
        <div class="form-row">
            <div class="form-group"><label>标题 *</label><input type="text" id="title" placeholder="文章标题"></div>
            <div class="form-group"><label>Slug *</label><input type="text" id="slug" placeholder="my-article"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>分类</label>
                <select id="category">
                    <option value="入门指南">入门指南</option>
                    <option value="安全知识">安全知识</option>
                    <option value="技巧教程">技巧教程</option>
                    <option value="圈层文化">圈层文化</option>
                    <option value="日常任务">日常任务</option>
                    <option value="挑战任务">挑战任务</option>
                </select>
            </div>
            <div class="form-group"><label>积分</label><input type="number" id="points" value="5" min="0"></div>
        </div>
        <div class="form-group"><label>摘要</label><input type="text" id="summary" placeholder="简短描述"></div>
        <div class="form-group"><label>封面图 URL</label><input type="text" id="cover" placeholder="https://example.com/cover.jpg"></div>
        <div class="form-group"><label>正文</label>
            <textarea id="editorTextarea" placeholder="支持 Markdown 语法"></textarea>
        </div>
        <div style="margin-top:16px; display:flex; gap:12px; flex-wrap:wrap;">
            <button class="btn btn-primary" id="publishBtn">🚀 发布</button>
            <button class="btn btn-secondary" id="clearBtn">清空</button>
        </div>
        <div id="statusMsg"></div>
    </div>

    <div class="panel">
        <h2>📋 已发布内容</h2>
        <div id="listContainer"><div style="text-align:center;padding:20px;color:rgba(255,255,255,0.1);">加载中…</div></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.js">
</script>

<script>
    var CONFIG = {
        owner: 'Foxsir-BDSM',
        repo: 'foxsir-content',
        branches: { knowledge: 'knowledge', tasks: 'tasks' },
        paths: { knowledge: 'articles', tasks: 'tasks' }
    };
    var TOKEN_KEY = 'foxsir_github_token';

    var tokenInput = document.getElementById('tokenInput');
    var saveTokenBtn = document.getElementById('saveTokenBtn');
    var tokenStatus = document.getElementById('tokenStatus');
    var tabs = document.querySelectorAll('.tab');
    var titleEl = document.getElementById('title');
    var slugEl = document.getElementById('slug');
    var categoryEl = document.getElementById('category');
    var pointsEl = document.getElementById('points');
    var summaryEl = document.getElementById('summary');
    var coverEl = document.getElementById('cover');
    var publishBtn = document.getElementById('publishBtn');
    var clearBtn = document.getElementById('clearBtn');
    var statusMsg = document.getElementById('statusMsg');
    var listContainer = document.getElementById('listContainer');
    var textarea = document.getElementById('editorTextarea');

    var currentTarget = 'knowledge';
    var editor = null;

    function clearCache(key) {
        localStorage.removeItem('foxsir_' + key);
    }

    function clearKnowledgeCache() {
        var keys = Object.keys(localStorage);
        for (var i = 0; i < keys.length; i++) {
            if (keys[i].startsWith('foxsir_list_knowledge_') ||
                keys[i].startsWith('foxsir_detail_knowledge_')) {
                localStorage.removeItem(keys[i]);
            }
        }
        console.log('🧹 知识区缓存已清除');
    }

    function clearTaskCache() {
        var keys = Object.keys(localStorage);
        for (var i = 0; i < keys.length; i++) {
            if (keys[i].startsWith('foxsir_list_tasks_') ||
                keys[i].startsWith('foxsir_detail_tasks_')) {
                localStorage.removeItem(keys[i]);
            }
        }
        console.log('🧹 任务区缓存已清除');
    }

    function getEnvToken() {
        if (typeof import.meta !== 'undefined' && import.meta.env && import.meta.env.VITE_GITHUB_TOKEN) {
            return import.meta.env.VITE_GITHUB_TOKEN;
        }
        return null;
    }

    function loadToken() {
        var token = localStorage.getItem(TOKEN_KEY);
        if (token && token.length > 10) {
            tokenInput.value = token;
            tokenStatus.textContent = '✅ 已配置（localStorage）';
            tokenStatus.className = 'token-status ok';
            return token;
        }
        var envToken = getEnvToken();
        if (envToken && envToken.length > 10) {
            tokenInput.value = envToken;
            localStorage.setItem(TOKEN_KEY, envToken);
            tokenStatus.textContent = '✅ 已配置（环境变量）';
            tokenStatus.className = 'token-status ok';
            return envToken;
        }
        tokenInput.value = '';
        tokenStatus.textContent = '❌ 未配置 Token';
        tokenStatus.className = 'token-status fail';
        return null;
    }

    function saveToken() {
        var token = tokenInput.value.trim();
        if (token && token.length > 10) {
            localStorage.setItem(TOKEN_KEY, token);
            tokenStatus.textContent = '✅ 已保存';
            tokenStatus.className = 'token-status ok';
            showStatus('Token 已保存', 'success');
            loadList();
        } else {
            localStorage.removeItem(TOKEN_KEY);
            tokenStatus.textContent = '❌ 无效 Token';
            tokenStatus.className = 'token-status fail';
            showStatus('请输入有效的 Token', 'error');
        }
    }
    saveTokenBtn.addEventListener('click', saveToken);

    function initEditor() {
        if (editor) return;
        try {
            editor = new EasyMDE({
                element: textarea,
                spellChecker: false,
                toolbar: ['bold', 'italic', 'heading', '|', 'quote', 'unordered-list', 'ordered-list', '|', 'link', 'image', 'table', '|', 'preview', 'side-by-side', 'fullscreen'],
                status: ['lines', 'words']
            });
            console.log('✅ EasyMDE 初始化成功');
        } catch (err) {
            console.error('❌ EasyMDE 初始化失败:', err);
            textarea.style.display = 'block';
            textarea.style.minHeight = '300px';
            textarea.style.background = 'rgba(255,255,255,0.02)';
            textarea.style.color = '#d4d0c8';
            textarea.style.padding = '12px';
            textarea.style.border = '1px solid rgba(255,255,255,0.04)';
            textarea.style.borderRadius = '12px';
            showStatus('编辑器加载失败，已降级为纯文本区', 'error');
        }
    }

    function showStatus(text, type) {
        if (type === undefined) type = 'loading';
        statusMsg.textContent = text;
        statusMsg.className = type;
        statusMsg.style.display = 'block';
    }
    function hideStatus() { statusMsg.style.display = 'none'; }

    function generateSlug(title) {
        return title.toLowerCase().replace(/[^\w\u4e00-\u9fa5\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').slice(0, 50);
    }

    async function loadList() {
        var token = loadToken();
        if (!token) {
            listContainer.innerHTML = '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.1);">请先配置 GitHub Token</div>';
            return;
        }
        var branch = CONFIG.branches[currentTarget];
        var path = CONFIG.paths[currentTarget];
        try {
            var res = await fetch('https://api.github.com/repos/' + CONFIG.owner + '/' + CONFIG.repo + '/contents/' + path + '?ref=' + branch, {
                headers: { 'Authorization': 'token ' + token }
            });
            if (!res.ok) {
                if (res.status === 401) {
                    listContainer.innerHTML = '<div style="text-align:center;padding:20px;color:#f87171;">❌ Token 无效或权限不足，请重新生成并保存</div>';
                    return;
                }
                if (res.status === 404) {
                    listContainer.innerHTML = '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.1);">📭 暂无内容</div>';
                    return;
                }
                throw new Error('HTTP ' + res.status);
            }
            var data = await res.json();
            var files = data.filter(function(f) { return f.name.endsWith('.md'); });
            if (files.length === 0) {
                listContainer.innerHTML = '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.1);">📭 暂无内容</div>';
                return;
            }
            listContainer.innerHTML = files.map(function(f) {
                return '<div class="list-item"><span>' + f.name.replace('.md', '') + '</span><span class="date">' + new Date(f.commit?.committer?.date || f.sha).toLocaleDateString() + '</span></div>';
            }).join('');
        } catch (e) {
            listContainer.innerHTML = '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.1);">⚠️ ' + e.message + '</div>';
        }
    }

    async function publishArticle() {
        var token = loadToken();
        if (!token) { showStatus('请先配置 GitHub Token', 'error'); return; }

        var title = titleEl.value.trim();
        var slug = slugEl.value.trim();
        if (!title) { showStatus('请输入标题', 'error'); return; }
        if (!slug) { slug = generateSlug(title); slugEl.value = slug; }

        var content;
        if (editor) {
            content = editor.value();
        } else {
            content = textarea.value;
        }
        if (!content) { showStatus('请输入正文', 'error'); return; }

        var frontmatter = '---\ntitle: ' + title + '\nslug: ' + slug + '\ncategory: ' + categoryEl.value + '\nreading_points: ' + (parseInt(pointsEl.value) || 0) + '\nsummary: ' + (summaryEl.value.trim() || '') + '\ncover_url: ' + (coverEl.value.trim() || '') + '\nis_public: true\ncreated_at: ' + new Date().toISOString() + '\n---\n\n';
        var fullContent = frontmatter + content;
        var path = CONFIG.paths[currentTarget] + '/' + slug + '.md';
        var branch = CONFIG.branches[currentTarget];

        showStatus('⏳ 发布到 ' + currentTarget + '…', 'loading');
        publishBtn.disabled = true;

        try {
            var sha = null;
            try {
                var check = await fetch('https://api.github.com/repos/' + CONFIG.owner + '/' + CONFIG.repo + '/contents/' + path + '?ref=' + branch, {
                    headers: { 'Authorization': 'token ' + token }
                });
                if (check.ok) { var existing = await check.json(); sha = existing.sha; }
            } catch (_) {}

            var encoder = new TextEncoder();
            var data = encoder.encode(fullContent);
            var binary = '';
            data.forEach(function(byte) { binary += String.fromCharCode(byte); });
            var contentBase64 = btoa(binary);

            var payload = {
                message: '📝 发布: ' + title + ' (' + currentTarget + ')',
                content: contentBase64,
                branch: branch
            };
            if (sha) payload.sha = sha;

            var commitRes = await fetch('https://api.github.com/repos/' + CONFIG.owner + '/' + CONFIG.repo + '/contents/' + path, {
                method: 'PUT',
                headers: {
                    'Authorization': 'token ' + token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            var responseText = await commitRes.text();
            if (!commitRes.ok) {
                var errMsg = responseText;
                try { var j = JSON.parse(responseText); errMsg = j.message || errMsg; } catch (_) {}
                throw new Error(errMsg);
            }

            if (currentTarget === 'knowledge') {
                clearKnowledgeCache();
            } else {
                clearTaskCache();
            }

            showStatus('✅ 发布成功！已推送到 ' + currentTarget, 'success');
            await loadList();
            slugEl.value = '';
            summaryEl.value = '';
            coverEl.value = '';
            if (editor) editor.value('');
            else textarea.value = '';
            titleEl.value = '';
        } catch (err) {
            console.error('发布失败:', err);
            showStatus('❌ 失败: ' + err.message, 'error');
        } finally {
            publishBtn.disabled = false;
        }
    }

    tabs.forEach(function(tab) {
        tab.addEventListener('click', function() {
            tabs.forEach(function(t) { t.classList.remove('active'); });
            tab.classList.add('active');
            currentTarget = tab.dataset.target;
            loadList();
        });
    });

    publishBtn.addEventListener('click', publishArticle);
    clearBtn.addEventListener('click', function() {
        if (editor) editor.value('');
        else textarea.value = '';
        titleEl.value = '';
        slugEl.value = '';
        summaryEl.value = '';
        coverEl.value = '';
        hideStatus();
    });
    titleEl.addEventListener('blur', function() {
        if (!slugEl.value.trim()) slugEl.value = generateSlug(titleEl.value);
    });

    document.addEventListener('DOMContentLoaded', function() {
        console.log('🚀 DOM 已加载，初始化…');
        loadToken();
        initEditor();
        loadList();
    });

    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        console.log('🚀 DOM 已就绪，立即初始化…');
        loadToken();
        setTimeout(function() {
            initEditor();
            loadList();
        }, 50);
    }
</script>
</body>
</html>
