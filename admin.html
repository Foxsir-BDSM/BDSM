<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理面板 · Foxsir</title>
  <link rel="icon" href="/assets/images/OIP-A.jpg" type="image/jpeg" />
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/admin.css" />
  <style>
    /* ★ 修复管理后台白背景 ★ */
    body { background: #0f0e17 !important; color: #fffffe !important; }
    .admin-header { background: rgba(255,255,255,0.02) !important; border-bottom: 1px solid rgba(255,255,255,0.04) !important; }
    .admin-header .brand-mark h1 { color: #fffffe !important; }
    .admin-header .admin-user { color: rgba(255,255,255,0.6) !important; }
    .rule-banner { background: rgba(255,255,255,0.02) !important; border-color: rgba(255,255,255,0.04) !important; }
    .rule-text h2 { color: #fffffe !important; }
    .rule-text p { color: rgba(255,255,255,0.6) !important; }
    .tab-nav { border-bottom: 1px solid rgba(255,255,255,0.04) !important; }
    .tab-btn { color: rgba(255,255,255,0.3) !important; }
    .tab-btn.active { color: #d4a574 !important; border-bottom-color: #d4a574 !important; }
    .tab-content { background: rgba(255,255,255,0.02) !important; }
    .toolbar { border-bottom: 1px solid rgba(255,255,255,0.04) !important; }
    .toolbar .stats-label { color: rgba(255,255,255,0.3) !important; }
    .toolbar .stats-label strong { color: #fffffe !important; }
    #userSearchInput, #subSearchInput { background: rgba(255,255,255,0.02) !important; color: #fffffe !important; border: 1px solid rgba(255,255,255,0.04) !important; }
    #userSearchInput::placeholder, #subSearchInput::placeholder { color: rgba(255,255,255,0.1) !important; }
    .admin-table th { color: rgba(255,255,255,0.3) !important; border-bottom: 1px solid rgba(255,255,255,0.04) !important; }
    .admin-table td { color: rgba(255,255,255,0.6) !important; border-bottom: 1px solid rgba(255,255,255,0.02) !important; }
    .admin-table select { background: rgba(255,255,255,0.02) !important; color: #fffffe !important; border: 1px solid rgba(255,255,255,0.04) !important; }
    .admin-table select option { background: #1a1a1a !important; color: #fffffe !important; }
    .btn-gold { background: linear-gradient(135deg, #d4a574, #b8946a) !important; color: #0f0e17 !important; }
    .btn-logout { background: rgba(239,68,68,0.06) !important; color: #f87171 !important; }
    .coming-soon { color: rgba(255,255,255,0.3) !important; }
    .coming-soon .sub-text { color: rgba(255,255,255,0.1) !important; }
    .empty { color: rgba(255,255,255,0.2) !important; }
    .error { color: #f87171 !important; }
    .push-result { color: rgba(255,255,255,0.6) !important; }
    .push-result.success { color: #22c55e !important; }
    .push-result.error { color: #f87171 !important; }
    .save-status { color: rgba(255,255,255,0.3) !important; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
      }
    }
  </script>
</head>
<body>
  <!-- ===== 顶部导航 ===== -->
  <header class="admin-header">
    <div class="header-left">
      <a href="/" class="back-link">← 返回欲研所</a>
      <div class="brand-mark">
        <img src="/assets/images/OIP-C.jpg" alt="Foxsir" class="brand-icon" />
        <h1>管理面板</h1>
      </div>
    </div>
    <div class="header-right">
      <span id="adminUserInfo" class="admin-user"></span>
      <button id="adminLogoutBtn" class="btn-logout">登出</button>
    </div>
  </header>

  <!-- ===== 规则横幅 ===== -->
  <div class="rule-banner">
    <img src="/assets/images/OIP-A.jpg" alt="母の规则" class="rule-image" />
    <div class="rule-text">
      <h2>📜 管理规则</h2>
      <p>本面板用于管理用户权限及档案信息的可见性。请谨慎操作，所有变更将记录日志。</p>
    </div>
  </div>

  <!-- ===== Tab 导航 ===== -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="userPerm">
      👤 用户权限 <span class="badge ready">已就绪</span>
    </button>
    <button class="tab-btn" data-tab="domArchive">
      📤 上位档案 <span class="badge coming">开发中</span>
    </button>
    <button class="tab-btn" data-tab="subArchive">
      📥 下位档案 <span class="badge ready">已就绪</span>
    </button>
  </nav>

  <!-- ===== Tab 内容 ===== -->
  <div class="tab-content">

    <!-- 面板一：用户权限 -->
    <div class="tab-pane active" id="pane-userPerm">
      <div class="toolbar">
        <div class="left">
          <span class="stats-label">共 <strong id="totalUsers">0</strong> 位用户</span>
        </div>
        <div class="right">
          <input type="text" id="userSearchInput" placeholder="🔍 搜索昵称或邮箱…" />
          <button id="pushBtn" class="btn btn-gold">📤 Push 生效</button>
        </div>
      </div>
      <div id="userTableContainer"></div>
      <div id="pushResult" class="push-result"></div>
    </div>

    <!-- 面板二：上位档案（占位） -->
    <div class="tab-pane" id="pane-domArchive">
      <div class="coming-soon">
        <div class="placeholder-icon">🚧</div>
        <p>上位档案馆尚未接入</p>
        <p class="sub-text">此功能即将开放，敬请期待……</p>
      </div>
    </div>

    <!-- 面板三：下位档案 -->
    <div class="tab-pane" id="pane-subArchive">
      <div class="toolbar">
        <div class="left">
          <span class="stats-label">共 <strong id="subTotalCount">0</strong> 条档案</span>
        </div>
        <div class="right">
          <input type="text" id="subSearchInput" placeholder="🔍 搜索姓名" />
        </div>
      </div>
      <div id="subRecordsContainer"></div>
    </div>

  </div>

  <script type="module" src="/assets/js/admin.js"></script>
</body>
</html>
