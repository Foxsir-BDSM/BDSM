<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文章 · Foxsir</title>
    <link rel="icon" href="/assets/images/OIP-C.jpg" type="image/jpeg" />
    <link rel="stylesheet" href="/assets/css/main.css" />
    <style>
        /* ★ 强制深色覆盖 ★ */
        body { background: #0f0e17 !important; color: #fffffe !important; }
        .article-body { color: rgba(255,255,255,0.85) !important; }
        .article-body h1, .article-body h2, .article-body h3 { color: #fffffe !important; }

        /* ===== 原有样式 ===== */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            background-image: radial-gradient(ellipse at 50% 30%, rgba(212,165,116,0.05) 0%, transparent 60%);
            padding: 40px 20px;
        }
        .article-container { max-width: 800px; margin:0 auto; }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.2);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .back-link:hover { color: rgba(255,255,255,0.6); }
        .article-header {
            margin-bottom: 24px;
        }
        .article-header .category {
            display: inline-block;
            background: rgba(212,165,116,0.06);
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 12px;
            color: #d4a574;
            margin-bottom: 8px;
        }
        .article-header h1 {
            font-family: 'Georgia', serif;
            font-size: 32px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 8px;
        }
        .article-header .meta {
            font-size: 13px;
            color: rgba(255,255,255,0.2);
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .article-body {
            font-size: 17px;
            line-height: 1.8;
            padding: 20px 0;
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        .article-body h2 { font-size: 24px; margin: 28px 0 12px; }
        .article-body h3 { font-size: 20px; margin: 24px 0 8px; }
        .article-body p { margin-bottom: 16px; }
        .article-body ul, .article-body ol { padding-left: 24px; margin-bottom: 16px; }
        .article-body blockquote {
            padding: 12px 20px;
            border-left: 3px solid #d4a574;
            background: rgba(212,165,116,0.03);
            border-radius: 0 8px 8px 0;
            margin: 16px 0;
            color: rgba(255,255,255,0.6);
        }
        .article-body img {
            max-width: 100%;
            border-radius: 12px;
            margin: 16px 0;
        }
        .article-footer {
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .error-msg {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.2);
        }
        .error-msg .icon { font-size: 48px; margin-bottom: 16px; }
        .error-msg a { color: #d4a574; text-decoration: none; }
        .error-msg a:hover { text-decoration: underline; }
        @media (max-width: 480px) {
            .article-header h1 { font-size: 24px; }
            .article-body { font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="article-container">
        <a href="/assets/pages/knowledge/index.html" class="back-link">← 返回列表</a>
        <div id="articleContent">
            <p style="color:rgba(255,255,255,0.2);">加载中…</p>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    <script type="module">
        import { CONTENT_CONFIG } from '@/js/content-config.js';
        import { getCurrentUser } from '@/js/auth.js';
        import { showLoading, hideLoading } from '@/js/loading.js';
        import { getToken } from '@/js/content-manager.js';
        import { getCache, setCache } from '@/js/cache.js';

        var params = new URLSearchParams(window.location.search);
        var slug = params.get('slug');
        var container = document.getElementById('articleContent');

        if (!slug) {
            container.innerHTML = '<div class="error-msg"><div class="icon">📭</div><p>未指定文章</p></div>';
            throw new Error('No slug');
        }

        var user = null;
        var article = null;

        // ===== 从 GitHub 获取文章内容（带缓存） =====
        async function fetchArticleFromGitHub(slug) {
            var cacheKey = 'detail_knowledge_' + slug;

            // ★ 优先读取缓存 ★
            var cached = getCache(cacheKey);
            if (cached) {
                console.log('📦 命中详情缓存:', slug);
                return cached;
            }

            console.log('📡 未命中详情缓存，从 GitHub 拉取:', slug);

            var branch = CONTENT_CONFIG.branches.knowledge;
            var path = CONTENT_CONFIG.paths.knowledge;
            var url = CONTENT_CONFIG.getApiUrl(branch, path);
            var token = getToken();

            if (!token) {
                throw new Error('未配置 GitHub Token');
            }

            try {
                var response = await fetch(url, {
                    headers: { 'Authorization': 'token ' + token }
                });
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                var data = await response.json();
                var mdFiles = data.filter(function(f) { return f.name.endsWith('.md'); });

                var targetFile = mdFiles.find(function(f) { return f.name.replace('.md', '') === slug; });
                if (!targetFile) {
                    throw new Error('文章不存在');
                }

                var contentRes = await fetch(targetFile.download_url);
                var raw = await contentRes.text();
                var parsed = parseFrontmatter(raw);

                // ★ 存入缓存（永久有效） ★
                setCache(cacheKey, parsed);
                console.log('✅ 详情缓存已写入:', slug);

                return parsed;
            } catch (err) {
                console.error('获取文章失败:', err);
                return null;
            }
        }

        // ===== 解析 Frontmatter =====
        function parseFrontmatter(raw) {
            var frontmatterRegex = /^---\n([\s\S]*?)\n---\n([\s\S]*)$/;
            var match = raw.match(frontmatterRegex);

            if (!match) {
                return {
                    title: '未命名文章',
                    slug: '',
                    summary: '',
                    category: '未分类',
                    content: raw,
                    is_public: true,
                    reading_points: 0,
                    created_at: new Date().toISOString(),
                    cover_url: ''
                };
            }

            var frontmatterStr = match[1];
            var content = match[2].trim();
            var lines = frontmatterStr.split('\n');
            var data = {};
            var currentKey = '';
            var currentValue = '';

            for (var i = 0; i < lines.length; i++) {
                var trimmed = lines[i].trim();
                if (!trimmed) continue;
                var colonIndex = trimmed.indexOf(':');
                if (colonIndex === -1) {
                    if (currentKey) { currentValue += '\n' + trimmed; }
                    continue;
                }
                var key = trimmed.substring(0, colonIndex).trim();
                var value = trimmed.substring(colonIndex + 1).trim();
                if (value === '|' || value === '>') {
                    currentKey = key;
                    currentValue = '';
                    continue;
                }
                data[key] = value;
                currentKey = '';
                currentValue = '';
            }

            if (currentKey && currentValue) {
                data[currentKey] = currentValue.trim();
            }

            return {
                title: data.title || '未命名文章',
                slug: data.slug || '',
                summary: data.summary || '',
                category: data.category || '未分类',
                content: content,
                is_public: data.is_public !== 'false',
                reading_points: parseInt(data.reading_points) || 0,
                created_at: data.created_at || new Date().toISOString(),
                cover_url: data.cover_url || ''
            };
        }

        // ===== 加载文章 =====
        async function loadArticle() {
            showLoading('加载文章', '正在翻阅…');
            try {
                user = await getCurrentUser();
                article = await fetchArticleFromGitHub(slug);

                if (!article) {
                    container.innerHTML = '<div class="error-msg"><div class="icon">⚠️</div><p>文章不存在或加载失败</p></div>';
                    hideLoading(false);
                    return;
                }

                if (!article.is_public && !user) {
                    container.innerHTML = '<div class="error-msg"><div class="icon">🔒</div><p>此文章仅限登录用户阅读</p><a href="/auth.html?redirect=' + encodeURIComponent(window.location.pathname + window.location.search) + '">登录后解锁</a></div>';
                    hideLoading(false);
                    return;
                }

                renderArticle();
            } catch (err) {
                console.error('加载失败:', err);
                container.innerHTML = '<div class="error-msg"><div class="icon">⚠️</div><p>加载失败，请稍后重试</p></div>';
            } finally {
                hideLoading(false);
            }
        }

        // ===== 渲染文章 =====
        function renderArticle() {
            var coverHtml = article.cover_url
                ? '<img src="' + article.cover_url + '" alt="封面" style="width:100%; border-radius:12px; margin-bottom:20px;" />'
                : '';

            var bodyHtml = article.content
                .replace(/\n/g, '<br />')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/^#{1,6}\s+(.*)$/gm, function(match, p1) {
                    var level = match.match(/^#+/)[0].length;
                    var size = level === 1 ? '24px' : level === 2 ? '20px' : '18px';
                    return '<h' + level + ' style="font-size:' + size + ';margin:20px 0 8px;color:#fffffe;">' + p1 + '</h' + level + '>';
                });

            container.innerHTML = '<div class="article-header">' +
                '<span class="category">' + article.category + '</span>' +
                '<h1>' + article.title + '</h1>' +
                '<div class="meta"><span>' + new Date(article.created_at).toLocaleDateString('zh-CN') + '</span>' +
                (article.is_public ? '<span>公开</span>' : '<span>🔒 私密</span>') +
                '</div></div>' +
                coverHtml +
                '<div class="article-body">' + bodyHtml + '</div>' +
                '<div class="article-footer"></div>';
        }

        loadArticle();
    </script>
</body>
</html>
