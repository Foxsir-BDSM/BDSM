<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文章 · Foxsir</title>
    <link rel="icon" href="/assets/images/OIP-C.jpg" type="image/jpeg" />
    <link rel="stylesheet" href="/assets/css/main.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0f0e17;
            color: #fffffe;
            min-height: 100vh;
            background-image: radial-gradient(ellipse at 50% 30%, rgba(212,165,116,0.05) 0%, transparent 60%);
            padding: 40px 20px;
        }
        .article-container { max-width: 800px; margin:0 auto; }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.2);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .back-link:hover { color: rgba(255,255,255,0.6); }
        .article-header {
            margin-bottom: 24px;
        }
        .article-header .category {
            display: inline-block;
            background: rgba(212,165,116,0.06);
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 12px;
            color: #d4a574;
            margin-bottom: 8px;
        }
        .article-header h1 {
            font-family: 'Georgia', serif;
            font-size: 32px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 8px;
        }
        .article-header .meta {
            font-size: 13px;
            color: rgba(255,255,255,0.2);
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .article-body {
            font-size: 17px;
            line-height: 1.8;
            color: rgba(255,255,255,0.85);
            padding: 20px 0;
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        .article-body h2 { font-size: 24px; margin: 28px 0 12px; color: #fffffe; }
        .article-body h3 { font-size: 20px; margin: 24px 0 8px; color: #fffffe; }
        .article-body p { margin-bottom: 16px; }
        .article-body ul, .article-body ol { padding-left: 24px; margin-bottom: 16px; }
        .article-body blockquote {
            padding: 12px 20px;
            border-left: 3px solid #d4a574;
            background: rgba(212,165,116,0.03);
            border-radius: 0 8px 8px 0;
            margin: 16px 0;
            color: rgba(255,255,255,0.6);
        }
        .article-body img {
            max-width: 100%;
            border-radius: 12px;
            margin: 16px 0;
        }
        .article-footer {
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .article-footer .points {
            font-size: 14px;
            color: #d4a574;
        }
        .article-footer .btn-claim {
            padding: 8px 24px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #d4a574, #b8946a);
            color: #0f0e17;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-size: 14px;
        }
        .article-footer .btn-claim:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(212,165,116,0.2);
        }
        .article-footer .btn-claim:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .error-msg {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.2);
        }
        .error-msg .icon { font-size: 48px; margin-bottom: 16px; }
        .error-msg a { color: #d4a574; text-decoration: none; }
        .error-msg a:hover { text-decoration: underline; }
        @media (max-width: 480px) {
            .article-header h1 { font-size: 24px; }
            .article-body { font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="article-container">
        <a href="/assets/pages/knowledge/index.html" class="back-link">← 返回列表</a>
        <div id="articleContent">
            <p style="color:rgba(255,255,255,0.2);">加载中…</p>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    <script type="module">
        import { CONTENT_CONFIG } from '@/js/content-config.js';
        import { getCurrentUser } from '@/js/auth.js';
        import { showLoading, hideLoading } from '@/js/loading.js';

        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');
        const container = document.getElementById('articleContent');

        if (!slug) {
            container.innerHTML = `<div class="error-msg"><div class="icon">📭</div><p>未指定文章</p></div>`;
            throw new Error('No slug');
        }

        let user = null;
        let article = null;
        let hasRead = false;

        // ===== 获取 Token =====
        function getToken() {
            const token = localStorage.getItem('foxsir_github_token');
            if (token && token.length > 10) return token;
            return '';
        }

        // ===== 从 GitHub 获取文章内容 =====
        async function fetchArticleFromGitHub(slug) {
            const branch = CONTENT_CONFIG.branches.knowledge;
            const path = CONTENT_CONFIG.paths.knowledge;
            const url = CONTENT_CONFIG.getApiUrl(branch, path);
            const token = getToken();
            
            try {
                const response = await fetch(url, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                const mdFiles = data.filter(f => f.name.endsWith('.md'));
                
                const targetFile = mdFiles.find(f => f.name.replace('.md', '') === slug);
                if (!targetFile) {
                    throw new Error('文章不存在');
                }
                
                const contentRes = await fetch(targetFile.download_url);
                const raw = await contentRes.text();
                return parseFrontmatter(raw);
            } catch (err) {
                console.error('获取文章失败:', err);
                return null;
            }
        }

        // ===== 解析 Frontmatter =====
        function parseFrontmatter(raw) {
            const frontmatterRegex = /^---\n([\s\S]*?)\n---\n([\s\S]*)$/;
            const match = raw.match(frontmatterRegex);
            
            if (!match) {
                return {
                    title: '未命名文章',
                    slug: '',
                    summary: '',
                    category: '未分类',
                    content: raw,
                    is_public: true,
                    reading_points: 0,
                    created_at: new Date().toISOString(),
                    cover_url: ''
                };
            }

            const frontmatterStr = match[1];
            const content = match[2].trim();
            
            const lines = frontmatterStr.split('\n');
            const data = {};
            let currentKey = '';
            let currentValue = '';

            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed) continue;
                
                const colonIndex = trimmed.indexOf(':');
                if (colonIndex === -1) {
                    if (currentKey) {
                        currentValue += '\n' + trimmed;
                    }
                    continue;
                }
                
                const key = trimmed.substring(0, colonIndex).trim();
                let value = trimmed.substring(colonIndex + 1).trim();
                
                if (value === '|' || value === '>') {
                    currentKey = key;
                    currentValue = '';
                    continue;
                }
                
                data[key] = value;
                currentKey = '';
                currentValue = '';
            }

            if (currentKey && currentValue) {
                data[currentKey] = currentValue.trim();
            }

            return {
                title: data.title || '未命名文章',
                slug: data.slug || '',
                summary: data.summary || '',
                category: data.category || '未分类',
                content: content,
                is_public: data.is_public !== 'false',
                reading_points: parseInt(data.reading_points) || 0,
                created_at: data.created_at || new Date().toISOString(),
                cover_url: data.cover_url || ''
            };
        }

        // ===== 加载文章 =====
        async function loadArticle() {
            showLoading('加载文章', '正在翻阅…');
            try {
                user = await getCurrentUser();
                article = await fetchArticleFromGitHub(slug);
                
                if (!article) {
                    container.innerHTML = `<div class="error-msg"><div class="icon">⚠️</div><p>文章不存在或加载失败</p></div>`;
                    hideLoading(false);
                    return;
                }

                if (!article.is_public && !user) {
                    container.innerHTML = `
                        <div class="error-msg">
                            <div class="icon">🔒</div>
                            <p>此文章仅限登录用户阅读</p>
                            <a href="/auth.html?redirect=${encodeURIComponent(window.location.pathname + window.location.search)}">登录后解锁</a>
                        </div>
                    `;
                    hideLoading(false);
                    return;
                }

                renderArticle();
            } catch (err) {
                console.error('加载失败:', err);
                container.innerHTML = `<div class="error-msg"><div class="icon">⚠️</div><p>加载失败，请稍后重试</p></div>`;
            } finally {
                hideLoading(false);
            }
        }

        // ===== 渲染文章 =====
        function renderArticle() {
            const coverHtml = article.cover_url
                ? `<img src="${article.cover_url}" alt="封面" style="width:100%; border-radius:12px; margin-bottom:20px;" />`
                : '';

            let bodyHtml = article.content
                .replace(/\n/g, '<br />')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/^#{1,6}\s+(.*)$/gm, (match, p1) => {
                    const level = match.match(/^#+/)[0].length;
                    const size = level === 1 ? '24px' : level === 2 ? '20px' : '18px';
                    return `<h${level} style="font-size:${size};margin:20px 0 8px;color:#fffffe;">${p1}</h${level}>`;
                });

            const pointsHtml = (user && article.reading_points > 0) ? `
                <span class="points">📖 阅读可得 ${article.reading_points} 积分</span>
            ` : '';

            const claimBtnHtml = (user && article.reading_points > 0 && !hasRead) ? `
                <button class="btn-claim" id="claimBtn">领取积分</button>
            ` : (user && article.reading_points > 0 && hasRead ? `
                <span style="font-size:13px;color:rgba(255,255,255,0.15);">✅ 已领取积分</span>
            ` : '');

            container.innerHTML = `
                <div class="article-header">
                    <span class="category">${article.category}</span>
                    <h1>${article.title}</h1>
                    <div class="meta">
                        <span>${new Date(article.created_at).toLocaleDateString('zh-CN')}</span>
                        ${article.is_public ? '<span>公开</span>' : '<span>🔒 私密</span>'}
                    </div>
                </div>
                ${coverHtml}
                <div class="article-body">
                    ${bodyHtml}
                </div>
                <div class="article-footer">
                    ${pointsHtml}
                    ${claimBtnHtml}
                </div>
            `;

            const claimBtn = document.getElementById('claimBtn');
            if (claimBtn) {
                claimBtn.addEventListener('click', async () => {
                    claimBtn.disabled = true;
                    claimBtn.textContent = '领取中…';
                    try {
                        const { supabase } = await import('/assets/js/supabase-client.js');
                        const { data: readData } = await supabase
                            .from('article_reads')
                            .select('id')
                            .eq('user_id', user.id)
                            .eq('article_id', slug)
                            .maybeSingle();
                        
                        if (readData) {
                            alert('你已经领取过这篇文章的积分了！');
                            claimBtn.textContent = '已领取';
                            claimBtn.disabled = true;
                            return;
                        }

                        const { error: insertError } = await supabase
                            .from('article_reads')
                            .insert({ user_id: user.id, article_id: slug, points_claimed: true });
                        if (insertError) throw insertError;

                        const newPoints = (user.user_metadata?.points || 0) + article.reading_points;
                        const { error: updateError } = await supabase.auth.updateUser({
                            data: { points: newPoints }
                        });
                        if (updateError) throw updateError;

                        alert(`🎉 获得 ${article.reading_points} 积分！`);
                        hasRead = true;
                        claimBtn.textContent = '已领取';
                        claimBtn.disabled = true;
                        setTimeout(() => location.reload(), 500);
                    } catch (err) {
                        console.error('领取失败:', err);
                        alert('领取失败，请重试');
                        claimBtn.disabled = false;
                        claimBtn.textContent = '领取积分';
                    }
                });
            }
        }

        // ===== 初始化 =====
        loadArticle();
    </script>
</body>
</html>
