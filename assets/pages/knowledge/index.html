<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>欲识之海 · Foxsir</title>
    <link rel="icon" href="/assets/images/OIP-C.jpg" type="image/jpeg" />
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css" />
    <style>
        /* 深色覆盖 + 基础样式（与之前相同，省略重复） */
        body { background: #0f0e17 !important; color: #fffffe !important; }
        .article-card { background: rgba(255,255,255,0.04) !important; backdrop-filter: blur(8px) !important; border: 1px solid rgba(255,255,255,0.06) !important; }
        .article-card h3 { color: #fffffe !important; }
        .article-card p { color: rgba(255,255,255,0.5) !important; }
        .article-card .meta { color: rgba(255,255,255,0.2) !important; }
        .article-card .footer { color: rgba(255,255,255,0.1) !important; border-top-color: rgba(255,255,255,0.04) !important; }
        .CodeMirror-selected { background: rgba(212,165,116,0.35) !important; }
        .CodeMirror .CodeMirror-cursor { border-left: 2px solid #d4a574 !important; }
        .CodeMirror .CodeMirror-matchingbracket { color: #d4a574 !important; background: transparent !important; }
        .editor-preview { background: #0f0e17 !important; color: #d4d0c8 !important; }
        .editor-preview * { color: #d4d0c8 !important; }
        .CodeMirror { background: rgba(255,255,255,0.02) !important; color: #d4d0c8 !important; }
        .CodeMirror-gutters { background: rgba(255,255,255,0.02) !important; border-right: 1px solid rgba(255,255,255,0.04) !important; }
        select { background: rgba(255,255,255,0.02) !important; color: #fffffe !important; border: 1px solid rgba(255,255,255,0.04) !important; }
        select option { background: #1a1a1a !important; color: #fffffe !important; }
        select:focus { outline: none; border-color: rgba(212,165,116,0.2) !important; }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            background-image: radial-gradient(ellipse at 50% 30%, rgba(212,165,116,0.05) 0%, transparent 60%);
            background-attachment: fixed;
            padding: 40px 20px;
        }
        .container { max-width: 1000px; margin:0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 {
            font-family: 'Georgia', serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #f5d6a8, #d4a574);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .right-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .header .right-actions .btn {
            padding: 8px 18px;
            border-radius: 30px;
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            text-decoration: none;
        }
        .header .right-actions .btn-admin {
            background: rgba(212,165,116,0.06);
            color: #d4a574;
            border: 1px solid rgba(212,165,116,0.08);
        }
        .header .right-actions .btn-admin:hover { background: rgba(212,165,116,0.12); }
        .header .right-actions .btn-admin.active {
            background: rgba(212,165,116,0.15);
            border-color: rgba(212,165,116,0.2);
            color: #f0d6b0;
        }
        .header .right-actions .btn-publish {
            background: linear-gradient(135deg, #d4a574, #b8946a);
            color: #0f0e17;
        }
        .header .right-actions .btn-publish:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(212,165,116,0.2);
        }
        .header .back-link {
            color: rgba(255,255,255,0.2);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .header .back-link:hover { color: rgba(255,255,255,0.6); }
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .filters .filter-btn {
            padding: 6px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.04);
            background: transparent;
            color: rgba(255,255,255,0.2);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        .filters .filter-btn.active {
            background: rgba(212,165,116,0.08);
            border-color: rgba(212,165,116,0.12);
            color: #d4a574;
        }
        .filters .filter-btn:hover:not(.active) { color: rgba(255,255,255,0.6); }
        .article-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .article-card {
            border-radius: 18px;
            padding: 20px;
            transition: all 0.35s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .article-card:hover {
            transform: translateY(-4px);
            border-color: rgba(212,165,116,0.12);
            background: rgba(255,255,255,0.04);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }
        .article-card .cover {
            width: 100%;
            height: 140px;
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            margin-bottom: 14px;
            background-color: rgba(255,255,255,0.02);
            flex-shrink: 0;
        }
        .article-card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            margin-bottom: 6px;
        }
        .article-card .meta .category {
            background: rgba(212,165,116,0.06);
            padding: 0 10px;
            border-radius: 20px;
            color: #d4a574;
        }
        .article-card h3 {
            font-size: 17px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .article-card p {
            font-size: 13px;
            line-height: 1.5;
            flex: 1;
        }
        .article-card .footer {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            border-top: 1px solid rgba(255,255,255,0.02);
            padding-top: 10px;
        }
        .article-card .footer .badge { color: #d4a574; }
        .article-card .card-actions {
            display: none;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        .article-card .card-actions .btn-sm {
            padding: 4px 14px;
            border-radius: 20px;
            border: none;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        .article-card .card-actions .btn-delete {
            background: rgba(239,68,68,0.06);
            color: #f87171;
        }
        .article-card .card-actions .btn-delete:hover { background: rgba(239,68,68,0.12); }
        .article-card .card-actions.visible { display: flex; }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.15);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        @media (max-width: 480px) {
            .article-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 22px; }
            .header .right-actions .btn { font-size: 11px; padding: 6px 12px; }
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 8, 12, 0.75);
            backdrop-filter: blur(12px);
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.25s ease;
        }
        .modal-overlay.active { display: flex; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-box {
            background: rgba(15, 14, 23, 0.95);
            border: 1px solid rgba(212, 165, 116, 0.12);
            border-radius: 24px;
            padding: 32px 36px;
            max-width: 780px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            position: relative;
        }
        .modal-box::-webkit-scrollbar { width: 4px; }
        .modal-box::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        .modal-box::-webkit-scrollbar-thumb { background: rgba(212,165,116,0.15); border-radius: 10px; }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.15);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s;
            font-family: inherit;
        }
        .modal-close:hover { color: rgba(255,255,255,0.5); }
        .modal-title {
            font-family: 'Georgia', serif;
            font-size: 24px;
            font-weight: 600;
            color: #fffffe;
            margin-bottom: 20px;
        }
        .modal-box .form-group { margin-bottom: 14px; }
        .modal-box .form-group label {
            display: block;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .modal-box .form-group input,
        .modal-box .form-group select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.04);
            background: rgba(255,255,255,0.02);
            color: #fffffe;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        .modal-box .form-group input:focus,
        .modal-box .form-group select:focus {
            outline: none;
            border-color: rgba(212,165,116,0.2);
        }
        .modal-box .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .modal-box .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 18px;
            flex-wrap: wrap;
        }
        .modal-box .form-actions .btn {
            padding: 12px 32px;
            border-radius: 30px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-size: 15px;
        }
        .btn-primary { background: linear-gradient(135deg, #d4a574, #b8946a); color: #0f0e17; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(212,165,116,0.2); }
        .btn-secondary { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.3); }
        .btn-secondary:hover { background: rgba(255,255,255,0.08); }
        .modal-box .EasyMDEContainer { border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.04); }
        .modal-box .EasyMDEContainer .CodeMirror { background: rgba(255,255,255,0.02); min-height: 200px; color: #d4d0c8; }
        .modal-box .EasyMDEContainer .editor-toolbar { background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.04); }
        .modal-box .EasyMDEContainer .editor-toolbar button { color: rgba(255,255,255,0.3); }
        .modal-box .EasyMDEContainer .editor-toolbar button:hover { background: rgba(212,165,116,0.06); color: #d4a574; }
        .modal-box .EasyMDEContainer .editor-preview { background: rgba(255,255,255,0.02); color: #d4d0c8; }
        #modalStatus {
            margin-top: 12px;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            display: none;
        }
        #modalStatus.success { display: block; background: rgba(34,197,94,0.06); color: #22c55e; border: 1px solid rgba(34,197,94,0.06); }
        #modalStatus.error { display: block; background: rgba(239,68,68,0.06); color: #f87171; border: 1px solid rgba(239,68,68,0.06); }
        #modalStatus.loading { display: block; background: rgba(212,165,116,0.06); color: #d4a574; border: 1px solid rgba(212,165,116,0.06); }
        @media (max-width: 600px) {
            .modal-box { padding: 20px; }
            .modal-box .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📚 欲识之海</h1>
        <div class="right-actions" id="adminActions">
            <a href="/landing.html#modules-section" class="back-link">← 返回探索</a>
            <button class="btn btn-publish" id="publishBtn" style="display:none;">✨ 发布</button>
            <button class="btn btn-admin" id="manageBtn" style="display:none;">⚙️ 管理</button>
        </div>
    </div>

    <div class="filters" id="filterContainer">
        <button class="filter-btn active" data-category="all">全部</button>
        <button class="filter-btn" data-category="入门指南">入门指南</button>
        <button class="filter-btn" data-category="安全知识">安全知识</button>
        <button class="filter-btn" data-category="技巧教程">技巧教程</button>
        <button class="filter-btn" data-category="圈层文化">圈层文化</button>
    </div>

    <div class="article-grid" id="articleGrid">
        <div class="empty-state"><div class="icon">📖</div><p>加载中…</p></div>
    </div>
</div>

<!-- ===== Modal（发布面板 - 新布局） ===== -->
<div class="modal-overlay" id="editorModal">
    <div class="modal-box">
        <button class="modal-close" id="modalCloseBtn">✕</button>
        <div class="modal-title" id="modalTitle">📝 发布新文章</div>

        <input type="hidden" id="editMode" value="create" />
        <!-- Slug 隐藏，由 JS 自动生成 -->
        <input type="hidden" id="modalSlug" />

        <!-- 第一行：标题 -->
        <div class="form-group">
            <label>标题 *</label>
            <input type="text" id="modalTitleInput" placeholder="文章标题" />
        </div>

        <!-- 第二行：作者 + 分类 -->
        <div class="form-row">
            <div class="form-group">
                <label>作者</label>
                <input type="text" id="modalAuthor" placeholder="作者名称" />
            </div>
            <div class="form-group">
                <label>分类</label>
                <select id="modalCategory">
                    <option value="入门指南">入门指南</option>
                    <option value="安全知识">安全知识</option>
                    <option value="技巧教程">技巧教程</option>
                    <option value="圈层文化">圈层文化</option>
                </select>
            </div>
        </div>

        <!-- 第三行：摘要 -->
        <div class="form-group">
            <label>摘要</label>
            <input type="text" id="modalSummary" placeholder="简短描述（可选）" />
        </div>

        <!-- 第四行：封面图 URL -->
        <div class="form-group">
            <label>封面图 URL</label>
            <input type="text" id="modalCover" placeholder="https://example.com/cover.jpg" />
        </div>

        <!-- 第五行：正文 -->
        <div class="form-group">
            <label>正文</label>
            <textarea id="modalEditorTextarea" placeholder="支持 Markdown 语法"></textarea>
        </div>

        <div id="modalStatus"></div>

        <div class="form-actions">
            <button class="btn btn-primary" id="modalSubmitBtn">🚀 发布</button>
            <button class="btn btn-secondary" id="modalCancelBtn">取消</button>
        </div>
    </div>
</div>

<!-- ===== Import Map ===== -->
<script type="importmap">
{
    "imports": {
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
    }
}
</script>

<script type="module">
    import { getCurrentUser } from '@/js/auth.js';
    import { getUserRole } from '@/js/identity.js';
    import { showLoading, hideLoading } from '@/js/loading.js';
    import { CONTENT_CONFIG } from '@/js/content-config.js';
    import {
        getToken,
        fetchContentList,
        createOrUpdateContent,
        deleteContent,
        parseFrontmatter,
        generateSlug,
        buildFullContent
    } from '@/js/content-manager.js';
    import { clearCache } from '@/js/cache.js';
    import EasyMDE from 'easymde';

    var token = getToken();
    window.__foxsir_token = token;
    console.log('🔑 getToken 返回值:', token ? token.substring(0, 10) + '…' : 'null');

    var BRANCH = CONTENT_CONFIG.branches.knowledge;
    var PATH = CONTENT_CONFIG.paths.knowledge;
    var TARGET_NAME = '知识区';

    var grid = document.getElementById('articleGrid');
    var filterBtns = document.querySelectorAll('.filter-btn');
    var publishBtn = document.getElementById('publishBtn');
    var manageBtn = document.getElementById('manageBtn');
    var modal = document.getElementById('editorModal');
    var modalCloseBtn = document.getElementById('modalCloseBtn');
    var modalCancelBtn = document.getElementById('modalCancelBtn');
    var modalSubmitBtn = document.getElementById('modalSubmitBtn');
    var modalTitle = document.getElementById('modalTitle');
    var modalTitleInput = document.getElementById('modalTitleInput');
    var modalSlug = document.getElementById('modalSlug');
    var modalCategory = document.getElementById('modalCategory');
    var modalAuthor = document.getElementById('modalAuthor');
    var modalSummary = document.getElementById('modalSummary');
    var modalCover = document.getElementById('modalCover');
    var modalEditorTextarea = document.getElementById('modalEditorTextarea');
    var modalStatus = document.getElementById('modalStatus');
    var editMode = document.getElementById('editMode');

    var currentCategory = 'all';
    var allArticles = [];
    var isManageMode = false;
    var editorInstance = null;
    var currentUserRole = null;
    var pendingContent = '';

    async function checkAdmin() {
        var user = await getCurrentUser();
        var role = await getUserRole();
        currentUserRole = role;
        if (user && ['admin', 'subadmin'].includes(role)) {
            publishBtn.style.display = 'inline-block';
            manageBtn.style.display = 'inline-block';
            return true;
        }
        publishBtn.style.display = 'none';
        manageBtn.style.display = 'none';
        return false;
    }

    async function fetchArticles() {
        if (window.__foxsir_token) {}
        var files = await fetchContentList(BRANCH, PATH);
        var articles = await Promise.all(
            files.map(async function(file) {
                try {
                    var url = file.download_url + '?t=' + Date.now();
                    var res = await fetch(url);
                    var raw = await res.text();
                    return parseFrontmatter(raw, file.name);
                } catch {
                    return null;
                }
            })
        );
        return articles.filter(function(a) { return a !== null; });
    }

    async function renderArticles(category) {
        if (category === undefined) category = 'all';
        showLoading('加载文章', '欲识之海…');
        try {
            var user = await getCurrentUser();
            var articles = await fetchArticles();
            allArticles = articles;

            if (category !== 'all') {
                articles = articles.filter(function(a) { return a.category === category; });
            }

            if (!user) {
                articles = articles.filter(function(a) { return a.is_public; });
            }

            if (articles.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无文章，敬请期待</p></div>';
                return;
            }

            grid.innerHTML = articles.map(function(article) {
                var coverStyle = article.cover_url
                    ? 'background-image: url(' + article.cover_url + ');'
                    : 'background: linear-gradient(135deg, rgba(212,165,116,0.05), rgba(212,165,116,0.01));';
                var isLocked = !user && !article.is_public;

                return '<div class="article-card" data-slug="' + article.slug + '">' +
                    '<a href="/assets/pages/knowledge/article.html?slug=' + article.slug + '" style="text-decoration:none;color:inherit;display:flex;flex-direction:column;flex:1;">' +
                    '<div class="cover" style="' + coverStyle + '"></div>' +
                    '<div class="meta"><span class="category">' + article.category + '</span><span>' + new Date(article.created_at).toLocaleDateString('zh-CN') + '</span></div>' +
                    '<h3>' + article.title + '</h3>' +
                    '<p>' + (article.summary || '点击阅读全文…') + '</p>' +
                    '<div class="footer"><span>' + (isLocked ? '🔒 登录后解锁' : '📖 阅读') + '</span><span class="badge">' + (article.is_public ? '公开' : '私密') + '</span></div>' +
                    '</a>' +
                    '<div class="card-actions ' + (isManageMode ? 'visible' : '') + '">' +
                    '<button class="btn-sm btn-delete" data-slug="' + article.slug + '">🗑️ 删除</button>' +
                    '</div></div>';
            }).join('');

            document.querySelectorAll('.btn-delete').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var slug = btn.dataset.slug;
                    var article = allArticles.find(function(a) { return a.slug === slug; });
                    if (article) confirmDelete(article);
                });
            });

        } catch (err) {
            console.error('渲染失败:', err);
            grid.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>加载失败，请稍后重试</p></div>';
        } finally {
            hideLoading(false);
        }
    }

    manageBtn.addEventListener('click', function() {
        isManageMode = !isManageMode;
        manageBtn.classList.toggle('active', isManageMode);
        manageBtn.textContent = isManageMode ? '✕ 退出管理' : '⚙️ 管理';
        renderArticles(currentCategory);
    });

    filterBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
            filterBtns.forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            currentCategory = btn.dataset.category;
            renderArticles(currentCategory);
        });
    });

    // ===== 发布弹窗 =====
    function showStatus(text, type) {
        if (type === undefined) type = 'loading';
        modalStatus.textContent = text;
        modalStatus.className = type;
        modalStatus.style.display = 'block';
    }

    function hideStatus() {
        modalStatus.style.display = 'none';
    }

    function openEditor() {
        editMode.value = 'create';
        modalTitle.textContent = '📝 发布新文章';
        modalSubmitBtn.textContent = '🚀 发布';
        modalTitleInput.value = '';
        modalSlug.value = '';
        modalCategory.value = '入门指南';
        modalSummary.value = '';
        modalCover.value = '';
        pendingContent = '';

        // 自动填充作者
        getCurrentUser().then(function(user) {
            if (user && user.user_metadata && user.user_metadata.nickname) {
                modalAuthor.value = user.user_metadata.nickname;
            } else if (user && user.email) {
                modalAuthor.value = user.email.split('@')[0];
            } else {
                modalAuthor.value = '';
            }
        });

        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
        hideStatus();

        setTimeout(function() {
            initEditor();
            if (editorInstance) {
                editorInstance.value('');
            }
        }, 150);
    }

    function closeEditor() {
        modal.classList.remove('active');
        document.body.style.overflow = '';
        destroyEditor();
        hideStatus();
        pendingContent = '';
    }

    function initEditor() {
        destroyEditor();
        try {
            editorInstance = new EasyMDE({
                element: modalEditorTextarea,
                spellChecker: false,
                toolbar: ['bold', 'italic', 'heading', '|', 'quote', 'unordered-list', 'ordered-list', '|', 'link', 'image', 'table', '|', 'preview', 'side-by-side', 'fullscreen'],
                status: ['lines', 'words']
            });
            console.log('✅ EasyMDE 初始化成功');
        } catch (err) {
            console.error('❌ EasyMDE 初始化失败:', err);
            modalEditorTextarea.style.display = 'block';
            modalEditorTextarea.style.minHeight = '200px';
            modalEditorTextarea.style.background = 'rgba(255,255,255,0.02)';
            modalEditorTextarea.style.color = '#d4d0c8';
            modalEditorTextarea.style.padding = '12px';
            modalEditorTextarea.style.border = '1px solid rgba(255,255,255,0.04)';
            modalEditorTextarea.style.borderRadius = '12px';
        }
    }

    function destroyEditor() {
        if (editorInstance) {
            try {
                editorInstance.toTextArea();
            } catch (_) {}
            editorInstance = null;
        }
    }

    modalTitleInput.addEventListener('input', function() {
        var title = modalTitleInput.value.trim();
        if (title) {
            modalSlug.value = generateSlug(title);
        }
    });

    // ===== 提交发布 =====
    modalSubmitBtn.addEventListener('click', async function() {
        var title = modalTitleInput.value.trim();
        var slug = modalSlug.value.trim();
        var author = modalAuthor.value.trim() || '未知';
        var category = modalCategory.value;
        var summary = modalSummary.value.trim();
        var cover = modalCover.value.trim();
        var content = editorInstance ? editorInstance.value() : modalEditorTextarea.value;

        if (!title) { showStatus('请输入标题', 'error'); return; }
        if (!slug) { slug = generateSlug(title); modalSlug.value = slug; }
        if (!content) { showStatus('请输入正文内容', 'error'); return; }

        // 积分固定为 0
        var fullContent = buildFullContent(title, slug, category, 0, summary, cover, content);
        var filePath = PATH + '/' + slug + '.md';

        showStatus('⏳ 发布中…', 'loading');
        modalSubmitBtn.disabled = true;

        try {
            await createOrUpdateContent(
                BRANCH,
                filePath,
                fullContent,
                '📝 发布: ' + title + ' (' + TARGET_NAME + ')'
            );

            clearCache('list_' + BRANCH + '_' + PATH);
            var keys = Object.keys(localStorage);
            for (var i = 0; i < keys.length; i++) {
                if (keys[i].startsWith('foxsir_detail_knowledge_')) {
                    localStorage.removeItem(keys[i]);
                }
            }

            showStatus('✅ 发布成功！', 'success');
            setTimeout(function() {
                closeEditor();
                renderArticles(currentCategory);
            }, 600);
        } catch (err) {
            console.error('提交失败:', err);
            showStatus('❌ 失败: ' + err.message, 'error');
        } finally {
            modalSubmitBtn.disabled = false;
        }
    });

    // ===== 删除 =====
    async function confirmDelete(article) {
        if (!confirm('确定要删除「' + article.title + '」吗？此操作不可撤销。')) return;

        showLoading('删除中…', '');
        try {
            var filePath = PATH + '/' + article.slug + '.md';
            await deleteContent(BRANCH, filePath);

            clearCache('list_' + BRANCH + '_' + PATH);
            clearCache('detail_knowledge_' + article.slug);

            alert('✅ 删除成功！');
            renderArticles(currentCategory);
        } catch (err) {
            console.error('删除失败:', err);
            alert('❌ 删除失败：' + err.message);
        } finally {
            hideLoading(false);
        }
    }

    modalCloseBtn.addEventListener('click', closeEditor);
    modalCancelBtn.addEventListener('click', closeEditor);
    modal.addEventListener('click', function(e) {
        if (e.target === modal) closeEditor();
    });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && modal.classList.contains('active')) closeEditor();
    });

    publishBtn.addEventListener('click', openEditor);

    (async function init() {
        await checkAdmin();
        await renderArticles('all');
    })();
</script>
</body>
</html>
