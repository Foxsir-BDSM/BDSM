<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>欲识之海 · Foxsir</title>
    <link rel="icon" href="/assets/images/OIP-C.jpg" type="image/jpeg" />
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css" />
    <style>
        /* ===== 完整样式保留 ===== */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0f0e17;
            color: #fffffe;
            min-height: 100vh;
            background-image: radial-gradient(ellipse at 50% 30%, rgba(212,165,116,0.05) 0%, transparent 60%);
            background-attachment: fixed;
            padding: 40px 20px;
        }
        .container { max-width: 1000px; margin:0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 {
            font-family: 'Georgia', serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #f5d6a8, #d4a574);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .right-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .header .right-actions .btn {
            padding: 8px 18px;
            border-radius: 30px;
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            text-decoration: none;
        }
        .header .right-actions .btn-admin {
            background: rgba(212,165,116,0.06);
            color: #d4a574;
            border: 1px solid rgba(212,165,116,0.08);
        }
        .header .right-actions .btn-admin:hover {
            background: rgba(212,165,116,0.12);
        }
        .header .right-actions .btn-admin.active {
            background: rgba(212,165,116,0.15);
            border-color: rgba(212,165,116,0.2);
            color: #f0d6b0;
        }
        .header .right-actions .btn-publish {
            background: linear-gradient(135deg, #d4a574, #b8946a);
            color: #0f0e17;
        }
        .header .right-actions .btn-publish:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(212,165,116,0.2);
        }
        .header .back-link {
            color: rgba(255,255,255,0.2);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .header .back-link:hover { color: rgba(255,255,255,0.6); }
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .filters .filter-btn {
            padding: 6px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.04);
            background: transparent;
            color: rgba(255,255,255,0.2);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        .filters .filter-btn.active {
            background: rgba(212,165,116,0.08);
            border-color: rgba(212,165,116,0.12);
            color: #d4a574;
        }
        .filters .filter-btn:hover:not(.active) {
            color: rgba(255,255,255,0.6);
        }
        .article-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .article-card {
            background: rgba(255,255,255,0.02);
            border-radius: 18px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.04);
            transition: all 0.35s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .article-card:hover {
            transform: translateY(-4px);
            border-color: rgba(212,165,116,0.12);
            background: rgba(255,255,255,0.04);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }
        .article-card .cover {
            width: 100%;
            height: 140px;
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            margin-bottom: 14px;
            background-color: rgba(255,255,255,0.02);
            flex-shrink: 0;
        }
        .article-card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: rgba(255,255,255,0.15);
            margin-bottom: 6px;
        }
        .article-card .meta .category {
            background: rgba(212,165,116,0.06);
            padding: 0 10px;
            border-radius: 20px;
            color: #d4a574;
        }
        .article-card h3 {
            font-size: 17px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #fffffe;
        }
        .article-card p {
            font-size: 13px;
            color: rgba(255,255,255,0.3);
            line-height: 1.5;
            flex: 1;
        }
        .article-card .footer {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: rgba(255,255,255,0.1);
            border-top: 1px solid rgba(255,255,255,0.02);
            padding-top: 10px;
        }
        .article-card .footer .badge {
            color: #d4a574;
        }
        .article-card .card-actions {
            display: none;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        .article-card .card-actions .btn-sm {
            padding: 4px 14px;
            border-radius: 20px;
            border: none;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        .article-card .card-actions .btn-edit {
            background: rgba(212,165,116,0.06);
            color: #d4a574;
        }
        .article-card .card-actions .btn-edit:hover {
            background: rgba(212,165,116,0.12);
        }
        .article-card .card-actions .btn-delete {
            background: rgba(239,68,68,0.06);
            color: #f87171;
        }
        .article-card .card-actions .btn-delete:hover {
            background: rgba(239,68,68,0.12);
        }
        .article-card .card-actions.visible {
            display: flex;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.15);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        @media (max-width: 480px) {
            .article-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 22px; }
            .header .right-actions .btn { font-size: 11px; padding: 6px 12px; }
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 8, 12, 0.75);
            backdrop-filter: blur(12px);
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.25s ease;
        }
        .modal-overlay.active { display: flex; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-box {
            background: rgba(15, 14, 23, 0.95);
            border: 1px solid rgba(212, 165, 116, 0.12);
            border-radius: 24px;
            padding: 32px 36px;
            max-width: 780px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            position: relative;
        }
        .modal-box::-webkit-scrollbar { width: 4px; }
        .modal-box::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        .modal-box::-webkit-scrollbar-thumb { background: rgba(212,165,116,0.15); border-radius: 10px; }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.15);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s;
            font-family: inherit;
        }
        .modal-close:hover { color: rgba(255,255,255,0.5); }
        .modal-title {
            font-family: 'Georgia', serif;
            font-size: 24px;
            font-weight: 600;
            color: #fffffe;
            margin-bottom: 20px;
        }
        .modal-box .form-group { margin-bottom: 14px; }
        .modal-box .form-group label {
            display: block;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .modal-box .form-group input,
        .modal-box .form-group select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.04);
            background: rgba(255,255,255,0.02);
            color: #fffffe;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        .modal-box .form-group input:focus,
        .modal-box .form-group select:focus {
            outline: none;
            border-color: rgba(212,165,116,0.2);
        }
        .modal-box .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .modal-box .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 18px;
            flex-wrap: wrap;
        }
        .modal-box .form-actions .btn {
            padding: 12px 32px;
            border-radius: 30px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-size: 15px;
        }
        .btn-primary { background: linear-gradient(135deg, #d4a574, #b8946a); color: #0f0e17; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(212,165,116,0.2); }
        .btn-secondary { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.3); }
        .btn-secondary:hover { background: rgba(255,255,255,0.08); }
        .modal-box .EasyMDEContainer { border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.04); }
        .modal-box .EasyMDEContainer .CodeMirror { background: rgba(255,255,255,0.02); min-height: 200px; color: #d4d0c8; }
        .modal-box .EasyMDEContainer .editor-toolbar { background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.04); }
        .modal-box .EasyMDEContainer .editor-toolbar button { color: rgba(255,255,255,0.3); }
        .modal-box .EasyMDEContainer .editor-toolbar button:hover { background: rgba(212,165,116,0.06); color: #d4a574; }
        .modal-box .EasyMDEContainer .editor-preview { background: rgba(255,255,255,0.02); color: #d4d0c8; }
        #modalStatus {
            margin-top: 12px;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            display: none;
        }
        #modalStatus.success { display: block; background: rgba(34,197,94,0.06); color: #22c55e; border: 1px solid rgba(34,197,94,0.06); }
        #modalStatus.error { display: block; background: rgba(239,68,68,0.06); color: #f87171; border: 1px solid rgba(239,68,68,0.06); }
        #modalStatus.loading { display: block; background: rgba(212,165,116,0.06); color: #d4a574; border: 1px solid rgba(212,165,116,0.06); }
        @media (max-width: 600px) {
            .modal-box { padding: 20px; }
            .modal-box .form-row { grid-template-columns: 1fr; }
        }

        /* ★ BUG-008: 修复 EasyMDE 编辑器选中高亮不可见 ★ */
        .CodeMirror-selected { background: rgba(212,165,116,0.35) !important; }
        .CodeMirror .CodeMirror-cursor { border-left: 2px solid #d4a574 !important; }
        .CodeMirror .CodeMirror-matchingbracket { color: #d4a574 !important; background: transparent !important; }
        .editor-preview { background: #0f0e17 !important; color: #d4d0c8 !important; }
        .editor-preview * { color: #d4d0c8 !important; }
        .CodeMirror { background: rgba(255,255,255,0.02) !important; color: #d4d0c8 !important; }
        .CodeMirror-gutters { background: rgba(255,255,255,0.02) !important; border-right: 1px solid rgba(255,255,255,0.04) !important; }

        /* ★ BUG-009: 修复 select 在深色背景下白色背景 ★ */
        select {
            background: rgba(255,255,255,0.02) !important;
            color: #fffffe !important;
            border: 1px solid rgba(255,255,255,0.04) !important;
        }
        select option {
            background: #1a1a1a !important;
            color: #fffffe !important;
        }
        select:focus {
            outline: none;
            border-color: rgba(212,165,116,0.2) !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📚 欲识之海</h1>
        <div class="right-actions" id="adminActions">
            <a href="/landing.html#modules-section" class="back-link">← 返回探索</a>
            <button class="btn btn-publish" id="publishBtn" style="display:none;">✨ 发布</button>

    <div class="filters" id="filterContainer">
        <button class="filter-btn active" data-category="all">全部</button>

<!-- ===== Modal ===== -->
<div class="modal-overlay" id="editorModal">
    <div class="modal-box">
        <button class="modal-close" id="modalCloseBtn">✕</button>
        <div class="modal-title" id="modalTitle">📝 发布新文章</div>

        <input type="hidden" id="editSlug" />
        <input type="hidden" id="editMode" value="create" />

        <div class="form-row">
            <div class="form-group">
                <label>标题 *</label>
                <input type="text" id="modalTitleInput" placeholder="文章标题" />
            </div>
            <div class="form-group">
                <label>分类</label>
                <select id="modalCategory">
                    <option value="入门指南">入门指南</option>
                    <option value="安全知识">安全知识</option>
                    <option value="技巧教程">技巧教程</option>
                    <option value="圈层文化">圈层文化</option>
                </select>

        </div>
        <div class="form-row">
            <div class="form-group">

            <button class="btn btn-primary" id="modalSubmitBtn">🚀 发布</button>
            <button class="btn btn-secondary" id="modalCancelBtn">取消</button>

<!-- ===== Import Map ===== -->
<script type="importmap">
{
    "imports": {
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
    }

<script type="module">
    import { getCurrentUser } from '@/js/auth.js';
    import { getUserRole } from '@/js/identity.js';
    import { showLoading, hideLoading } from '@/js/loading.js';
    import { CONTENT_CONFIG } from '@/js/content-config.js';
    import {
        getToken,
        fetchContentList,
        createOrUpdateContent,
        deleteContent,
        parseFrontmatter,
        generateSlug,
        buildFullContent
    } from '@/js/content-manager.js';
    import EasyMDE from 'easymde';

    // ★ 强制保留 getToken 的引用，防止被树摇删除 ★
    const token = getToken();
    window.__foxsir_token = token;
    console.log('🔑 getToken 返回值:', token ? token.substring(0, 10) + '…' : 'null');

    // ===== 常量 =====
    const BRANCH = CONTENT_CONFIG.branches.knowledge;
    const PATH = CONTENT_CONFIG.paths.knowledge;
    const TARGET_NAME = '知识区';

    // ===== DOM 引用 =====
    const grid = document.getElementById('articleGrid');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const publishBtn = document.getElementById('publishBtn');
    const manageBtn = document.getElementById('manageBtn');
    const modal = document.getElementById('editorModal');
    const modalCloseBtn = document.getElementById('modalCloseBtn');
    const modalCancelBtn = document.getElementById('modalCancelBtn');
    const modalSubmitBtn = document.getElementById('modalSubmitBtn');
    const modalTitle = document.getElementById('modalTitle');
    const modalTitleInput = document.getElementById('modalTitleInput');
    const modalSlug = document.getElementById('modalSlug');
    const modalCategory = document.getElementById('modalCategory');
    const modalPoints = document.getElementById('modalPoints');
    const modalSummary = document.getElementById('modalSummary');
    const modalCover = document.getElementById('modalCover');
    const modalEditorTextarea = document.getElementById('modalEditorTextarea');
    const modalStatus = document.getElementById('modalStatus');
    const editSlug = document.getElementById('editSlug');
    const editMode = document.getElementById('editMode');

    let currentCategory = 'all';
    let allArticles = [];
    let isManageMode = false;
    let editorInstance = null;
    let currentUserRole = null;
    let pendingContent = '';   // 暂存编辑器内容

    // ===== 权限控制 =====
    async function checkAdmin() {
        const user = await getCurrentUser();
        const role = await getUserRole();
        currentUserRole = role;
        if (user && ['admin', 'subadmin'].includes(role)) {
            publishBtn.style.display = 'inline-block';
            manageBtn.style.display = 'inline-block';
            return true;
        }
        publishBtn.style.display = 'none';
        manageBtn.style.display = 'none';
        return false;
    }

    // ===== 获取文章列表（实时，带缓存破坏） =====
    async function fetchArticles() {
        // 强制引用 token，确保 getToken 不被优化
        if (window.__foxsir_token) {
            // 仅引用，不做任何操作
        }
        const files = await fetchContentList(BRANCH, PATH);
        const articles = await Promise.all(
            files.map(async (file) => {
                try {
                    // 加时间戳破坏缓存
                    const url = file.download_url + '?t=' + Date.now();
                    const res = await fetch(url);
                    const raw = await res.text();
                    return parseFrontmatter(raw, file.name);
                } catch {
                    return null;
                }
            })
        );
        return articles.filter(a => a !== null);
    }

    // ===== 渲染文章 =====
    async function renderArticles(category = 'all') {
        showLoading('加载文章', '欲识之海…');
        try {
            const user = await getCurrentUser();
            let articles = await fetchArticles();
            allArticles = articles;

            if (category !== 'all') {
                articles = articles.filter(a => a.category === category);
            }

            if (!user) {
                articles = articles.filter(a => a.is_public);
            }

            if (articles.length === 0) {
                grid.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>暂无文章，敬请期待</p></div>`;
                return;
            }

            grid.innerHTML = articles.map(article => {
                const coverStyle = article.cover_url
                    ? `background-image: url(${article.cover_url});`
                    : `background: linear-gradient(135deg, rgba(212,165,116,0.05), rgba(212,165,116,0.01));`;
                const isLocked = !user && !article.is_public;

                return `
                    <div class="article-card" data-slug="${article.slug}">
                        <a href="/assets/pages/knowledge/article.html?slug=${article.slug}" style="text-decoration:none;color:inherit;display:flex;flex-direction:column;flex:1;">
                            <div class="cover" style="${coverStyle}"></div>
                            <div class="meta">
                                <span class="category">${article.category}</span>
                                <span>${new Date(article.created_at).toLocaleDateString('zh-CN')}</span>
                            </div>
                            <h3>${article.title}</h3>
                            <p>${article.summary || '点击阅读全文…'}</p>
                            <div class="footer">
                                <span>${isLocked ? '🔒 登录后解锁' : '📖 阅读'}</span>
                                <span class="badge">${article.is_public ? '公开' : '私密'}</span>
                            </div>
                        </a>
                        <div class="card-actions ${isManageMode ? 'visible' : ''}">
                            <button class="btn-sm btn-edit" data-slug="${article.slug}">✏️ 编辑</button>
                            <button class="btn-sm btn-delete" data-slug="${article.slug}">🗑️ 删除</button>
                        </div>
                    </div>
                `;
            }).join('');

            // 绑定编辑/删除事件
            document.querySelectorAll('.btn-edit').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const slug = btn.dataset.slug;
                    const article = allArticles.find(a => a.slug === slug);
                    if (article) openEditor('edit', article);
                });
            });
            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const slug = btn.dataset.slug;
                    const article = allArticles.find(a => a.slug === slug);
                    if (article) confirmDelete(article);
                });
            });

        } catch (err) {
            console.error('渲染失败:', err);
            grid.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>加载失败，请稍后重试</p></div>`;
        } finally {
            hideLoading(false);
        }
    }

    // ===== 管理模式切换 =====
    manageBtn.addEventListener('click', () => {
        isManageMode = !isManageMode;
        manageBtn.classList.toggle('active', isManageMode);
        manageBtn.textContent = isManageMode ? '✕ 退出管理' : '⚙️ 管理';
        renderArticles(currentCategory);
    });

    // ===== 筛选 =====
    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.dataset.category;
            renderArticles(currentCategory);
        });
    });

    // ================================================================
    // 编辑器弹窗（修复内容填充 + 缓存破坏）
    // ================================================================

    function showStatus(text, type = 'loading') {
        modalStatus.textContent = text;
        modalStatus.className = type;
        modalStatus.style.display = 'block';
    }

    function hideStatus() {
        modalStatus.style.display = 'none';
    }

    function openEditor(mode, data = null) {
        editMode.value = mode;

        // ----- 填充表单字段（非编辑器部分） -----
        if (mode === 'create') {
            modalTitle.textContent = '📝 发布新文章';
            modalSubmitBtn.textContent = '🚀 发布';
            modalTitleInput.value = '';
            modalSlug.value = '';
            editSlug.value = '';
            modalCategory.value = '入门指南';
            modalPoints.value = 5;
            modalSummary.value = '';
            modalCover.value = '';
            pendingContent = '';
        } else if (mode === 'edit' && data) {
            modalTitle.textContent = `✏️ 编辑：${data.title}`;
            modalSubmitBtn.textContent = '💾 更新';
            modalTitleInput.value = data.title;
            modalSlug.value = data.slug;
            editSlug.value = data.slug;
            modalCategory.value = data.category || '入门指南';
            modalPoints.value = data.reading_points || 5;
            modalSummary.value = data.summary || '';
            modalCover.value = data.cover_url || '';
            pendingContent = data.content || '';
        }

        // ----- 显示弹窗 -----
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
        hideStatus();

        // ----- 初始化编辑器并填充内容（延迟确保 DOM 就绪） -----
        setTimeout(() => {
            initEditor();
            if (editorInstance) {
                editorInstance.value(pendingContent || '');
            }
        }, 150);
    }

    function closeEditor() {
        modal.classList.remove('active');
        document.body.style.overflow = '';
        destroyEditor();
        hideStatus();
        pendingContent = '';
    }

    function initEditor() {
        destroyEditor();
        try {
            editorInstance = new EasyMDE({
                element: modalEditorTextarea,
                spellChecker: false,
                toolbar: ['bold', 'italic', 'heading', '|', 'quote', 'unordered-list', 'ordered-list', '|', 'link', 'image', 'table', '|', 'preview', 'side-by-side', 'fullscreen'],
                status: ['lines', 'words']
            });
            console.log('✅ EasyMDE 初始化成功');
        } catch (err) {
            console.error('❌ EasyMDE 初始化失败:', err);
            modalEditorTextarea.style.display = 'block';
            modalEditorTextarea.style.minHeight = '200px';
            modalEditorTextarea.style.background = 'rgba(255,255,255,0.02)';
            modalEditorTextarea.style.color = '#d4d0c8';
            modalEditorTextarea.style.padding = '12px';
            modalEditorTextarea.style.border = '1px solid rgba(255,255,255,0.04)';
            modalEditorTextarea.style.borderRadius = '12px';
        }
    }

    function destroyEditor() {
        if (editorInstance) {
            try {
                editorInstance.toTextArea();
            } catch (_) {}
            editorInstance = null;
        }
    }

    // ===== 标题 → Slug 自动生成 =====
    modalTitleInput.addEventListener('input', () => {
        const title = modalTitleInput.value.trim();
        if (title && !editSlug.value) {
            modalSlug.value = generateSlug(title);
        }
    });

    // ===== 提交（发布/更新） =====
    modalSubmitBtn.addEventListener('click', async () => {
        const title = modalTitleInput.value.trim();
        let slug = modalSlug.value.trim() || editSlug.value;
        const category = modalCategory.value;
        const points = parseInt(modalPoints.value) || 0;
        const summary = modalSummary.value.trim();
        const cover = modalCover.value.trim();
        const content = editorInstance ? editorInstance.value() : modalEditorTextarea.value;

        if (!title) { showStatus('请输入标题', 'error'); return; }
        if (!slug) { slug = generateSlug(title); modalSlug.value = slug; }
        if (!content) { showStatus('请输入正文内容', 'error'); return; }

        const fullContent = buildFullContent(title, slug, category, points, summary, cover, content);
        const filePath = `${PATH}/${slug}.md`;
        const mode = editMode.value;

        showStatus(mode === 'create' ? '⏳ 发布中…' : '⏳ 更新中…', 'loading');
        modalSubmitBtn.disabled = true;

        try {
            await createOrUpdateContent(
                BRANCH,
                filePath,
                fullContent,
                mode === 'create' ? `📝 发布: ${title} (${TARGET_NAME})` : `✏️ 更新: ${title} (${TARGET_NAME})`
            );
            showStatus(`✅ ${mode === 'create' ? '发布' : '更新'}成功！`, 'success');
            setTimeout(() => {
                closeEditor();
                renderArticles(currentCategory);
            }, 600);
        } catch (err) {
            console.error('提交失败:', err);
            showStatus(`❌ 失败: ${err.message}`, 'error');
        } finally {
            modalSubmitBtn.disabled = false;
        }
    });

    // ===== 删除确认 =====
    async function confirmDelete(article) {
        if (!confirm(`确定要删除「${article.title}」吗？此操作不可撤销。`)) return;

        showLoading('删除中…', '');
        try {
            const filePath = `${PATH}/${article.slug}.md`;
            await deleteContent(BRANCH, filePath);
            alert('✅ 删除成功！');
            renderArticles(currentCategory);
        } catch (err) {
            console.error('删除失败:', err);
            alert('❌ 删除失败：' + err.message);
        } finally {
            hideLoading(false);
        }
    }

    // ===== Modal 关闭事件 =====
    modalCloseBtn.addEventListener('click', closeEditor);
    modalCancelBtn.addEventListener('click', closeEditor);
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeEditor();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('active')) closeEditor();
    });

    // ===== 发布按钮 =====
    publishBtn.addEventListener('click', () => {
        openEditor('create');
    });

    // ================================================================
    // 初始化
    // ================================================================

    (async function init() {
        await checkAdmin();
        await renderArticles('all');
    })();
</script>
</body>
</html>
