<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>任务详情 · Foxsir</title>
    <link rel="icon" href="/assets/images/OIP-C.jpg" type="image/jpeg" />
    <link rel="stylesheet" href="/assets/css/main.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0f0e17;
            color: #fffffe;
            min-height: 100vh;
            background-image: radial-gradient(ellipse at 50% 30%, rgba(212,165,116,0.05) 0%, transparent 60%);
            padding: 40px 20px;
        }
        .task-container { max-width: 800px; margin:0 auto; }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.2);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .back-link:hover { color: rgba(255,255,255,0.6); }
        .task-header {
            margin-bottom: 24px;
        }
        .task-header .category {
            display: inline-block;
            background: rgba(212,165,116,0.06);
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 12px;
            color: #d4a574;
            margin-bottom: 8px;
        }
        .task-header h1 {
            font-family: 'Georgia', serif;
            font-size: 32px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 8px;
        }
        .task-header .meta {
            font-size: 13px;
            color: rgba(255,255,255,0.2);
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .task-body {
            font-size: 17px;
            line-height: 1.8;
            color: rgba(255,255,255,0.85);
            padding: 20px 0;
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        .task-body h2 { font-size: 24px; margin: 28px 0 12px; color: #fffffe; }
        .task-body h3 { font-size: 20px; margin: 24px 0 8px; color: #fffffe; }
        .task-body p { margin-bottom: 16px; }
        .task-body ul, .task-body ol { padding-left: 24px; margin-bottom: 16px; }
        .task-body blockquote {
            padding: 12px 20px;
            border-left: 3px solid #d4a574;
            background: rgba(212,165,116,0.03);
            border-radius: 0 8px 8px 0;
            margin: 16px 0;
            color: rgba(255,255,255,0.6);
        }
        .task-body img {
            max-width: 100%;
            border-radius: 12px;
            margin: 16px 0;
        }
        .task-footer {
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .task-footer .points {
            font-size: 14px;
            color: #d4a574;
        }
        .task-footer .btn-claim {
            padding: 8px 24px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #d4a574, #b8946a);
            color: #0f0e17;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-size: 14px;
        }
        .task-footer .btn-claim:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(212,165,116,0.2);
        }
        .task-footer .btn-claim:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .error-msg {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.2);
        }
        .error-msg .icon { font-size: 48px; margin-bottom: 16px; }
        .error-msg a { color: #d4a574; text-decoration: none; }
        .error-msg a:hover { text-decoration: underline; }
        @media (max-width: 480px) {
            .task-header h1 { font-size: 24px; }
            .task-body { font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="task-container">
        <a href="/assets/pages/task/index.html" class="back-link">← 返回任务列表</a>
        <div id="taskContent">
            <p style="color:rgba(255,255,255,0.2);">加载中…</p>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    <script type="module">
        import { CONTENT_CONFIG } from '@/js/content-config.js';
        import { getCurrentUser } from '@/js/auth.js';
        import { showLoading, hideLoading } from '@/js/loading.js';

        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');
        const container = document.getElementById('taskContent');

        if (!slug) {
            container.innerHTML = `<div class="error-msg"><div class="icon">📭</div><p>未指定任务</p></div>`;
            throw new Error('No slug');
        }

        let user = null;
        let task = null;
        let hasRead = false;

        // ===== 获取 Token =====
        function getToken() {
            const token = localStorage.getItem('foxsir_github_token');
            if (token && token.length > 10) return token;
            if (typeof import.meta !== 'undefined' && import.meta.env && import.meta.env.VITE_GITHUB_TOKEN) {
                return import.meta.env.VITE_GITHUB_TOKEN;
            }
            return null;
        }

        // ===== 从 GitHub 获取任务内容 =====
        async function fetchTaskFromGitHub(slug) {
            const branch = CONTENT_CONFIG.branches.tasks;
            const path = CONTENT_CONFIG.paths.tasks;
            const url = CONTENT_CONFIG.getApiUrl(branch, path);
            const token = getToken();
            
            if (!token) {
                throw new Error('未配置 GitHub Token');
            }

            try {
                const response = await fetch(url, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (!Array.isArray(data)) throw new Error('数据格式错误');
                
                const mdFiles = data.filter(f => f && f.name && f.name.endsWith('.md'));
                const targetFile = mdFiles.find(f => f.name.replace('.md', '') === slug);
                if (!targetFile) throw new Error('任务不存在');
                
                const contentRes = await fetch(targetFile.download_url);
                const raw = await contentRes.text();
                return parseFrontmatter(raw);
            } catch (err) {
                console.error('获取任务失败:', err);
                return null;
            }
        }

        // ===== 解析 Frontmatter =====
        function parseFrontmatter(raw) {
            const frontmatterRegex = /^---\n([\s\S]*?)\n---\n([\s\S]*)$/;
            const match = raw.match(frontmatterRegex);
            
            if (!match) {
                return {
                    title: '未命名任务',
                    slug: '',
                    summary: '',
                    category: '日常任务',
                    content: raw,
                    is_public: true,
                    reading_points: 0,
                    created_at: new Date().toISOString(),
                    cover_url: ''
                };
            }

            const frontmatterStr = match[1];
            const content = match[2].trim();
            
            const lines = frontmatterStr.split('\n');
            const data = {};
            let currentKey = '';
            let currentValue = '';

            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed) continue;
                
                const colonIndex = trimmed.indexOf(':');
                if (colonIndex === -1) {
                    if (currentKey) currentValue += '\n' + trimmed;
                    continue;
                }
                
                const key = trimmed.substring(0, colonIndex).trim();
                let value = trimmed.substring(colonIndex + 1).trim();
                
                if (value === '|' || value === '>') {
                    currentKey = key;
                    currentValue = '';
                    continue;
                }
                data[key] = value;
                currentKey = '';
                currentValue = '';
            }

            if (currentKey && currentValue) {
                data[currentKey] = currentValue.trim();
            }

            return {
                title: data.title || '未命名任务',
                slug: data.slug || '',
                summary: data.summary || '',
                category: data.category || '日常任务',
                content: content,
                is_public: data.is_public !== 'false',
                reading_points: parseInt(data.reading_points) || 0,
                created_at: data.created_at || new Date().toISOString(),
                cover_url: data.cover_url || ''
            };
        }

        // ===== 加载任务 =====
        async function loadTask() {
            showLoading('加载任务', '正在翻阅…');
            try {
                user = await getCurrentUser();
                task = await fetchTaskFromGitHub(slug);
                
                if (!task) {
                    container.innerHTML = `<div class="error-msg"><div class="icon">⚠️</div><p>任务不存在或加载失败</p></div>`;
                    hideLoading(false);
                    return;
                }

                if (!task.is_public && !user) {
                    container.innerHTML = `
                        <div class="error-msg">
                            <div class="icon">🔒</div>
                            <p>此任务仅限登录用户查看</p>
                            <a href="/auth.html?redirect=${encodeURIComponent(window.location.pathname + window.location.search)}">登录后解锁</a>
                        </div>
                    `;
                    hideLoading(false);
                    return;
                }

                renderTask();
            } catch (err) {
                console.error('加载失败:', err);
                container.innerHTML = `<div class="error-msg"><div class="icon">⚠️</div><p>加载失败，请稍后重试</p></div>`;
            } finally {
                hideLoading(false);
            }
        }

        // ===== 渲染任务 =====
        function renderTask() {
            const coverHtml = task.cover_url
                ? `<img src="${task.cover_url}" alt="封面" style="width:100%; border-radius:12px; margin-bottom:20px;" />`
                : '';

            let bodyHtml = task.content
                .replace(/\n/g, '<br />')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/^#{1,6}\s+(.*)$/gm, (match, p1) => {
                    const level = match.match(/^#+/)[0].length;
                    const size = level === 1 ? '24px' : level === 2 ? '20px' : '18px';
                    return `<h${level} style="font-size:${size};margin:20px 0 8px;color:#fffffe;">${p1}</h${level}>`;
                });

            const pointsHtml = (user && task.reading_points > 0) ? `
                <span class="points">📖 完成任务可得 ${task.reading_points} 积分</span>
            ` : '';

            const claimBtnHtml = (user && task.reading_points > 0 && !hasRead) ? `
                <button class="btn-claim" id="claimBtn">领取积分</button>
            ` : (user && task.reading_points > 0 && hasRead ? `
                <span style="font-size:13px;color:rgba(255,255,255,0.15);">✅ 已领取积分</span>
            ` : '');

            container.innerHTML = `
                <div class="task-header">
                    <span class="category">${task.category}</span>
                    <h1>${task.title}</h1>
                    <div class="meta">
                        <span>${new Date(task.created_at).toLocaleDateString('zh-CN')}</span>
                        ${task.is_public ? '<span>公开</span>' : '<span>🔒 私密</span>'}
                    </div>
                </div>
                ${coverHtml}
                <div class="task-body">
                    ${bodyHtml}
                </div>
                <div class="task-footer">
                    ${pointsHtml}
                    ${claimBtnHtml}
                </div>
            `;

            const claimBtn = document.getElementById('claimBtn');
            if (claimBtn) {
                claimBtn.addEventListener('click', async () => {
                    claimBtn.disabled = true;
                    claimBtn.textContent = '领取中…';
                    try {
                        const { supabase } = await import('/assets/js/supabase-client.js');
                        const { data: readData } = await supabase
                            .from('article_reads')
                            .select('id')
                            .eq('user_id', user.id)
                            .eq('article_id', slug)
                            .maybeSingle();
                        
                        if (readData) {
                            alert('你已经领取过这个任务的积分了！');
                            claimBtn.textContent = '已领取';
                            claimBtn.disabled = true;
                            return;
                        }

                        const { error: insertError } = await supabase
                            .from('article_reads')
                            .insert({ user_id: user.id, article_id: slug, points_claimed: true });
                        if (insertError) throw insertError;

                        const newPoints = (user.user_metadata?.points || 0) + task.reading_points;
                        const { error: updateError } = await supabase.auth.updateUser({
                            data: { points: newPoints }
                        });
                        if (updateError) throw updateError;

                        alert(`🎉 获得 ${task.reading_points} 积分！`);
                        hasRead = true;
                        claimBtn.textContent = '已领取';
                        claimBtn.disabled = true;
                        setTimeout(() => location.reload(), 500);
                    } catch (err) {
                        // ★ BUG-005: 改进积分领取错误处理 ★
                        console.error('❌ 积分领取详细错误:', err);
                        let msg = '领取失败，请重试';
                        if (err.message?.includes('permission denied') || err.message?.includes('permission')) {
                            msg = '权限不足，请确保已登录';
                        } else if (err.message?.includes('duplicate')) {
                            msg = '您已领取过该积分';
                        } else if (err.message?.includes('network')) {
                            msg = '网络错误，请检查连接';
                        }
                        alert(msg);
                        claimBtn.disabled = false;
                        claimBtn.textContent = '领取积分';
                    }
                });
            }
        }

        loadTask();
    </script>
</body>
</html>
