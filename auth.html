<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 · Foxsir</title>
    <link rel="icon" href="/assets/images/OIP-A.jpg" type="image/jpeg" />
    <link rel="stylesheet" href="/assets/css/landing.css" />
    <link rel="stylesheet" href="/assets/css/identity-selector.css" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0f0e17;
            color: #fffffe;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image:
                radial-gradient(ellipse at 50% 30%, rgba(212,165,116,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 70%, rgba(212,165,116,0.04) 0%, transparent 50%);
            background-attachment: fixed;
        }
        .auth-wrapper {
            width: 100%;
            max-width: 1000px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 16px;
            color: rgba(255,255,255,0.2);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .back-link:hover { color: rgba(255,255,255,0.6); }
        #landing-root {
            display: flex;
            border-radius: 32px;
            overflow: hidden;
            min-height: 460px;
            background: rgba(15,14,23,0.5);
            border: 1px solid rgba(255,255,255,0.04);
        }
        #landing-root .brand-section {
            flex: 1;
            padding: 48px 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(15,14,23,0.3);
        }
        #landing-root .brand-section .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        #landing-root .brand-section .logo-wrapper .logo-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid rgba(212,165,116,0.1);
            flex-shrink: 0;
        }
        #landing-root .brand-section .logo-wrapper .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #landing-root .brand-section .logo-wrapper .version {
            font-family: 'Georgia', serif;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #f5d6a8, #d4a574);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }
        #landing-root .brand-section .tagline {
            font-family: 'Georgia', serif;
            font-size: 28px;
            font-weight: 600;
            color: #fffffe;
            margin-bottom: 8px;
            line-height: 1.2;
        }
        #landing-root .brand-section .description {
            font-size: 15px;
            color: rgba(255,255,255,0.4);
            line-height: 1.6;
            margin-bottom: 20px;
        }
        #landing-root .brand-section .features {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        #landing-root .brand-section .features span {
            font-size: 13px;
            color: rgba(255,255,255,0.2);
        }
        #landing-root .auth-section {
            flex: 0 0 380px;
            padding: 40px 36px;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.02);
            border-left: 1px solid rgba(255,255,255,0.04);
        }
        #landing-root .auth-section .auth-card { width: 100%; }
        #landing-root .auth-section .auth-card .tabs {
            display: flex;
            gap: 4px;
            background: rgba(255,255,255,0.02);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 20px;
        }
        #landing-root .auth-section .auth-card .tabs .tab-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.2);
            font-size: 14px;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        #landing-root .auth-section .auth-card .tabs .tab-btn.active {
            background: rgba(212,165,116,0.12);
            color: #d4a574;
        }
        #landing-root .auth-section .auth-card .tabs .tab-btn:hover:not(.active) {
            color: rgba(255,255,255,0.6);
        }
        #landing-root .auth-section .auth-card .auth-form {
            display: none;
            flex-direction: column;
            gap: 14px;
        }
        #landing-root .auth-section .auth-card .auth-form.active { display: flex; }
        #landing-root .auth-section .auth-card .auth-form .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        #landing-root .auth-section .auth-card .auth-form .form-group label {
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
        #landing-root .auth-section .auth-card .auth-form .form-group input,
        #landing-root .auth-section .auth-card .auth-form .form-group select {
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.04);
            background: rgba(255,255,255,0.03);
            color: #fffffe;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }
        #landing-root .auth-section .auth-card .auth-form .form-group input:focus {
            outline: none;
            border-color: rgba(212,165,116,0.2);
        }
        #landing-root .auth-section .auth-card .auth-form .form-group input::placeholder {
            color: rgba(255,255,255,0.1);
        }
        #landing-root .auth-section .auth-card .auth-form .btn-primary {
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #d4a574, #b8946a);
            color: #0f0e17;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            margin-top: 4px;
        }
        #landing-root .auth-section .auth-card .auth-form .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(212,165,116,0.2);
        }
        #landing-root .auth-section .auth-card .auth-form .auth-switch {
            font-size: 13px;
            color: rgba(255,255,255,0.15);
            text-align: center;
            margin-top: 4px;
        }
        #landing-root .auth-section .auth-card .auth-form .auth-switch a {
            color: #d4a574;
            text-decoration: none;
            cursor: pointer;
        }
        #landing-root .auth-section .auth-card .auth-form .auth-switch a:hover {
            text-decoration: underline;
        }
        #landing-root .auth-section .auth-card .message {
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            display: none;
        }
        #landing-root .auth-section .auth-card .message.error {
            display: block;
            background: rgba(239,68,68,0.06);
            color: #f87171;
            border: 1px solid rgba(239,68,68,0.06);
        }
        #landing-root .auth-section .auth-card .message.success {
            display: block;
            background: rgba(34,197,94,0.06);
            color: #22c55e;
            border: 1px solid rgba(34,197,94,0.06);
        }
        @media (max-width: 820px) {
            #landing-root { flex-direction: column; }
            #landing-root .auth-section {
                flex: unset;
                border-left: none;
                border-top: 1px solid rgba(255,255,255,0.04);
                padding: 28px 24px;
            }
            #landing-root .brand-section { padding: 32px 28px; }
            #landing-root .brand-section .tagline { font-size: 22px; }
        }
        @media (max-width: 480px) {
            #landing-root .brand-section { padding: 24px 18px; }
            #landing-root .brand-section .tagline { font-size: 19px; }
            #landing-root .auth-section { padding: 20px 16px; }
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <a href="/landing.html" class="back-link">← 返回首页</a>
        <div id="landing-root">
            <!-- 左区：品牌展示 -->
            <div class="brand-section">
                <div class="logo-wrapper">
                    <div class="logo-icon">
                        <img src="/assets/images/OIP-C.jpg" alt="Foxsir" />
                    </div>
                    <span class="version">Foxsir · 欲研社</span>
                </div>
                <h1 class="tagline">欲界之门 · 只渡有缘人</h1>
                <p class="description">
                    为 BDSM 同好打造的私密数字庄园。<br />
                    探索 · 记录 · 连接 · 成长
                </p>
                <div class="features">
                    <span>🔒 隐私至上</span>
                    <span>⚡ 实时互动</span>
                    <span>📜 档案传承</span>
                </div>
            </div>

            <!-- 右区：认证卡片 -->
            <div class="auth-section">
                <div class="auth-card">
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="login">登录</button>
                        <button class="tab-btn" data-tab="register">注册</button>
                    </div>

                    <form id="login-form" class="auth-form active">
                        <div class="form-group">
                            <label for="login-email">邮箱</label>
                            <input type="email" id="login-email" placeholder="you@example.com" required />
                        </div>
                        <div class="form-group">
                            <label for="login-password">密码</label>
                            <input type="password" id="login-password" placeholder="至少 6 位" required />
                        </div>
                        <button type="submit" class="btn-primary">进入欲界</button>
                        <p class="auth-switch">还没有账号？<a href="#" data-switch-to="register">立即注册</a></p>
                    </form>

                    <form id="register-form" class="auth-form">
                        <div class="form-group">
                            <label for="register-email">邮箱</label>
                            <input type="email" id="register-email" placeholder="you@example.com" required />
                        </div>
                        <div class="form-group">
                            <label for="register-nickname">昵称</label>
                            <input type="text" id="register-nickname" placeholder="圈内称呼" required />
                        </div>
                        <div class="form-group" id="identity-selector-container"></div>
                        <div class="form-group">
                            <label for="register-password">密码</label>
                            <input type="password" id="register-password" placeholder="至少 6 位" required />
                        </div>
                        <button type="submit" class="btn-primary">创建账号</button>
                        <p class="auth-switch">已有账号？<a href="#" data-switch-to="login">去登录</a></p>
                    </form>

                    <div id="auth-message" class="message"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    <script type="module">
        import { supabase } from '@/js/supabase-client.js';
        import { setSession, getCurrentUser } from '@/js/auth.js';
        import { renderIdentitySelector, getSelectedIdentityData, resetIdentitySelector } from '@/js/identity-selector.js';
        import { showLoading, hideLoading } from '@/js/loading.js';

        // ===== 跳转目标（从 URL 参数获取，默认首页） =====
        const params = new URLSearchParams(window.location.search);
        const redirectUrl = params.get('redirect') || '/index.html';

        // ===== DOM 引用 =====
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const msgBox = document.getElementById('auth-message');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const switchLinks = document.querySelectorAll('[data-switch-to]');

        // ===== 防重复跳转标记 =====
        let redirectPending = false;

        // ===== Tab 切换 =====
        function switchTab(tab) {
            tabBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
            loginForm.classList.toggle('active', tab === 'login');
            registerForm.classList.toggle('active', tab === 'register');
            msgBox.textContent = '';
            msgBox.className = 'message';
            if (tab === 'register') {
                resetIdentitySelector();
                renderIdentitySelector('identity-selector-container');
            }
        }

        tabBtns.forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
        switchLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                switchTab(link.dataset.switchTo);
            });
        });

        function showMsg(text, type = 'error') {
            msgBox.textContent = text;
            msgBox.className = `message ${type}`;
        }

        // ===== 统一跳转函数（带防重入） =====
        function navigateTo(target) {
            if (redirectPending) return;
            redirectPending = true;
            window.location.href = target;
        }

        // ===== 渲染身份选择器 =====
        renderIdentitySelector('identity-selector-container');

        // ============================================================
        // ★★★ 关键修复：不再在页面加载时主动跳转 ★★★
        // 已登录用户在 auth.html 的访问由 guard.js 统一处理，
        // 无需在此重复判断，避免与 guard 形成竞争。
        // ============================================================

        // ===== 登录提交 =====
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (redirectPending) return;

            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            if (!email || !password) return showMsg('请填写完整信息');

            showLoading('登录中', '验证凭证…');
            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                // 强制将会话写入 localStorage，确保后续页面能立即识别
                await setSession(data.session);
                showMsg('登录成功，即将跳转…', 'success');
                // 延迟跳转，确保会话已完全持久化
                setTimeout(() => navigateTo(redirectUrl), 400);
            } catch (err) {
                hideLoading(false);
                showMsg(err.message || '登录失败，请重试');
            }
        });

        // ===== 注册提交 =====
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (redirectPending) return;

            const email = document.getElementById('register-email').value.trim();
            const nickname = document.getElementById('register-nickname').value.trim();
            const password = document.getElementById('register-password').value;
            if (!email || !nickname || !password) return showMsg('请填写完整信息');
            if (password.length < 6) return showMsg('密码至少 6 位');

            const identityData = getSelectedIdentityData();
            if (!identityData.valid) {
                return showMsg(identityData.error, 'error');
            }

            showLoading('注册中', '创建你的专属身份…');
            try {
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            nickname,
                            role: 'self',
                            primary_identity: identityData.primaryId,
                            primary_label: identityData.primaryLabel,
                            gender: identityData.gender,
                            role_type: identityData.type,
                            secondary_identities: identityData.secondaryIds,
                            points: 0,
                        }
                    }
                });
                if (error) throw error;
                if (!data.user) throw new Error('注册异常，请重试');

                // 注册后自动登录
                const { error: signInError } = await supabase.auth.signInWithPassword({ email, password });
                if (signInError) throw signInError;

                // 强制同步会话
                await setSession(data.session);
                showMsg('注册成功，欢迎加入！', 'success');
                setTimeout(() => navigateTo(redirectUrl), 400);
            } catch (err) {
                hideLoading(false);
                showMsg(err.message || '注册失败，请重试');
            }
        });

        // ===== 监听 Auth 状态变化（仅用于日志调试，不触发跳转） =====
        // 所有跳转由 guard.js 统一控制，此处仅做状态记录
        supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                console.log('🔐 已登录:', session.user.email);
            }
            if (event === 'SIGNED_OUT') {
                console.log('🚪 已登出');
            }
        });
    </script>
</body>
</html>
