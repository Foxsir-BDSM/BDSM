    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0f0e17;
            color: #fffffe;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image:
                radial-gradient(ellipse at 50% 30%, rgba(212, 165, 116, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 70%, rgba(212, 165, 116, 0.04) 0%, transparent 50%);
            background-attachment: fixed;
        }

        .hero-wrapper {
            max-width: 800px;
            width: 100%;
            text-align: center;
            padding: 40px 20px;
        }

        .logo-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 20px;
            border: 1px solid rgba(212, 165, 116, 0.15);
            box-shadow: 0 0 40px rgba(212, 165, 116, 0.05);
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(212, 165, 116, 0.08);
            border: 1px solid rgba(212, 165, 116, 0.12);
            padding: 4px 18px;
            border-radius: 30px;
            font-size: 11px;
            color: #d4a574;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        h1 {
            font-family: 'Georgia', serif;
            font-size: 48px;
            font-weight: 700;
            line-height: 1.15;
            margin-bottom: 14px;
            background: linear-gradient(135deg, #f5d6a8 0%, #d4a574 50%, #b8946a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.5);
            max-width: 480px;
            margin: 0 auto 32px;
            line-height: 1.6;
        }

        /* ===== CTA 按钮组 ===== */
        .cta-group {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }
        .cta-group .btn {
            padding: 14px 36px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            text-decoration: none;
            display: inline-block;
        }
        .cta-group .btn-primary {
            background: linear-gradient(135deg, #d4a574, #b8946a);
            color: #0f0e17;
            box-shadow: 0 8px 32px rgba(212, 165, 116, 0.15);
        }
        .cta-group .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(212, 165, 116, 0.25);
        }
        .cta-group .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .cta-group .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fffffe;
        }

        /* ============================================================
           社交区域：分割线 + 引导语 + 图标（黑金配色）
           ============================================================ */
        .social-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 12px;
            margin-bottom: 14px;
        }
        .social-divider .line {
            flex: 1;
            max-width: 80px;
            height: 1px;
            background: rgba(255, 255, 255, 0.04);
        }
        .social-divider .label {
            font-size: 12px;
            color: rgba(212, 165, 116, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        /* ===== 作者社交 提亮 ===== */
        .social-divider .label strong {
            color: #d4a574;
            font-weight: 600;
            letter-spacing: 2.5px;
        }

        .social-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .social-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(212, 165, 116, 0.15);
            background: rgba(212, 165, 116, 0.02);
            color: #d4a574;
            text-decoration: none;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .social-btn:hover {
            background: rgba(212, 165, 116, 0.10);
            border-color: rgba(212, 165, 116, 0.30);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(212, 165, 116, 0.08);
        }

        /* ---------- Telegram 图标 ---------- */
        .social-btn.telegram svg {
            width: 22px;
            height: 22px;
            fill: #d4a574;
            stroke: none;
        }
        .social-btn.telegram:hover svg {
            fill: #f0d6b0;
        }

        /* ---------- Twitter / X 图标 ---------- */
        .social-btn.twitter svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: #d4a574;
            stroke-width: 2;
            stroke-linejoin: round;
        }
        .social-btn.twitter:hover svg {
            stroke: #f0d6b0;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: rgba(255, 255, 255, 0.04);
            margin: 20px auto 16px;
        }

        .footer-links {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.1);
        }
        .footer-links a {
            color: rgba(255, 255, 255, 0.15);
            text-decoration: none;
            transition: color 0.3s;
            margin: 0 8px;
        }
        .footer-links a:hover {
            color: rgba(255, 255, 255, 0.4);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            h1 {
                font-size: 32px;
            }
            .subtitle {
                font-size: 16px;
            }
            .cta-group .btn {
                padding: 12px 28px;
                font-size: 14px;
            }
            .social-btn {
                width: 40px;
                height: 40px;
            }
            .social-btn svg {
                width: 20px;
                height: 20px;
            }
            .social-divider .label {
                font-size: 10px;
            }
            .social-divider .line {
                max-width: 40px;
            }
        }
        @media (max-width: 380px) {
            .social-divider .label {
                font-size: 9px;
            }
            .social-divider .line {
                max-width: 24px;
            }
        }
    </style>
