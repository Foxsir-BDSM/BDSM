    <style>
        /* 深色覆盖 + 基础样式（与 knowledge 类似，省略重复） */
        body { background: #0f0e17 !important; color: #fffffe !important; }
        .task-card { background: rgba(255,255,255,0.04) !important; backdrop-filter: blur(8px) !important; border: 1px solid rgba(255,255,255,0.06) !important; }
        .task-card h3 { color: #fffffe !important; }
        .task-card p { color: rgba(255,255,255,0.5) !important; }
        .task-card .meta { color: rgba(255,255,255,0.2) !important; }
        .task-card .footer { color: rgba(255,255,255,0.1) !important; border-top-color: rgba(255,255,255,0.04) !important; }

        .CodeMirror .CodeMirror-cursor { border-left: 2px solid #d4a574 !important; }
        .CodeMirror .CodeMirror-matchingbracket { color: #d4a574 !important; background: transparent !important; }
        .editor-preview { background: #0f0e17 !important; color: #d4d0c8 !important; }
        .editor-preview * { color: #d4d0c8 !important; }
        .CodeMirror { background: rgba(255,255,255,0.02) !important; color: #d4d0c8 !important; }
        .CodeMirror-gutters { background: rgba(255,255,255,0.02) !important; border-right: 1px solid rgba(255,255,255,0.04) !important; }
        select { background: rgba(255,255,255,0.02) !important; color: #fffffe !important; border: 1px solid rgba(255,255,255,0.04) !important; }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            background-image: radial-gradient(ellipse at 50% 30%, rgba(212,165,116,0.05) 0%, transparent 60%);
            background-attachment: fixed;
            padding: 40px 20px;
        }
        .container { max-width: 1000px; margin:0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 {
            font-family: 'Georgia', serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #f5d6a8, #d4a574);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .right-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .header .right-actions .btn {
            padding: 8px 18px;
            border-radius: 30px;
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            text-decoration: none;
        }
        .header .right-actions .btn-admin {
            background: rgba(212,165,116,0.06);
            color: #d4a574;
            border: 1px solid rgba(212,165,116,0.08);
        }
        .header .right-actions .btn-admin:hover { background: rgba(212,165,116,0.12); }
        .header .right-actions .btn-admin.active {
            background: rgba(212,165,116,0.15);
            border-color: rgba(212,165,116,0.2);
            color: #f0d6b0;
        }
        .header .right-actions .btn-publish {
            background: linear-gradient(135deg, #d4a574, #b8946a);
            color: #0f0e17;
        }
        .header .right-actions .btn-publish:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(212,165,116,0.2);
        }
        .header .back-link {
            color: rgba(255,255,255,0.2);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .header .back-link:hover { color: rgba(255,255,255,0.6); }
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .filters .filter-btn {
            padding: 6px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.04);
            background: transparent;
            color: rgba(255,255,255,0.2);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        .filters .filter-btn.active {
            background: rgba(212,165,116,0.08);
            border-color: rgba(212,165,116,0.12);
            color: #d4a574;
        }
        .filters .filter-btn:hover:not(.active) { color: rgba(255,255,255,0.6); }
        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .task-card {
            border-radius: 18px;
            padding: 20px;
            transition: all 0.35s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .task-card:hover {
            transform: translateY(-4px);
            border-color: rgba(212,165,116,0.12);
            background: rgba(255,255,255,0.04);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }
        .task-card .cover {
            width: 100%;
            height: 140px;
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            margin-bottom: 14px;
            background-color: rgba(255,255,255,0.02);
            flex-shrink: 0;
        }
        .task-card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            margin-bottom: 6px;
        }
        .task-card .meta .category {
            background: rgba(212,165,116,0.06);
            padding: 0 10px;
            border-radius: 20px;
            color: #d4a574;
        }
        .task-card h3 {
            font-size: 17px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .task-card p {
            font-size: 13px;
            line-height: 1.5;
            flex: 1;
        }
        .task-card .footer {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            border-top: 1px solid rgba(255,255,255,0.02);
            padding-top: 10px;
        }
        .task-card .footer .badge { color: #d4a574; }
        .task-card .card-actions {
            display: none;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        .task-card .card-actions .btn-sm {
            padding: 4px 14px;
            border-radius: 20px;
            border: none;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        .task-card .card-actions .btn-delete {
            background: rgba(239,68,68,0.06);
            color: #f87171;
        }
        .task-card .card-actions .btn-delete:hover { background: rgba(239,68,68,0.12); }
        .task-card .card-actions.visible { display: flex; }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.15);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        @media (max-width: 480px) {
            .task-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 22px; }
            .header .right-actions .btn { font-size: 11px; padding: 6px 12px; }
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 8, 12, 0.75);
            backdrop-filter: blur(12px);
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.25s ease;
        }
        .modal-overlay.active { display: flex; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-box {
            background: rgba(15, 14, 23, 0.95);
            border: 1px solid rgba(212, 165, 116, 0.12);
            border-radius: 24px;
            padding: 32px 36px;
            max-width: 780px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            position: relative;
        }
        .modal-box::-webkit-scrollbar { width: 4px; }
        .modal-box::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        .modal-box::-webkit-scrollbar-thumb { background: rgba(212,165,116,0.15); border-radius: 10px; }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.15);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s;
            font-family: inherit;
        }
        .modal-close:hover { color: rgba(255,255,255,0.5); }
        .modal-title {
            font-family: 'Georgia', serif;
            font-size: 24px;
            font-weight: 600;
            color: #fffffe;
            margin-bottom: 20px;
        }
        .modal-box .form-group { margin-bottom: 14px; }
        .modal-box .form-group label {
            display: block;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .modal-box .form-group input,
        .modal-box .form-group select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.04);
            background: rgba(255,255,255,0.02);
            color: #fffffe;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        .modal-box .form-group input:focus,
        .modal-box .form-group select:focus {
            outline: none;
            border-color: rgba(212,165,116,0.2);
        }
        .modal-box .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .modal-box .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 18px;
            flex-wrap: wrap;
        }
        .modal-box .form-actions .btn {
            padding: 12px 32px;
            border-radius: 30px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-size: 15px;
        }
        .btn-primary { background: linear-gradient(135deg, #d4a574, #b8946a); color: #0f0e17; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(212,165,116,0.2); }
        .btn-secondary { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.3); }
        .btn-secondary:hover { background: rgba(255,255,255,0.08); }
        .modal-box .EasyMDEContainer { border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.04); }
        .modal-box .EasyMDEContainer .CodeMirror { background: rgba(255,255,255,0.02); min-height: 200px; color: #d4d0c8; }
        .modal-box .EasyMDEContainer .editor-toolbar { background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.04); }
        .modal-box .EasyMDEContainer .editor-toolbar button { color: rgba(255,255,255,0.3); }
        .modal-box .EasyMDEContainer .editor-toolbar button:hover { background: rgba(212,165,116,0.06); color: #d4a574; }
        .modal-box .EasyMDEContainer .editor-preview { background: rgba(255,255,255,0.02); color: #d4d0c8; }
        #modalStatus {
            margin-top: 12px;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            display: none;
        }
        #modalStatus.success { display: block; background: rgba(34,197,94,0.06); color: #22c55e; border: 1px solid rgba(34,197,94,0.06); }
        #modalStatus.error { display: block; background: rgba(239,68,68,0.06); color: #f87171; border: 1px solid rgba(239,68,68,0.06); }
        #modalStatus.loading { display: block; background: rgba(212,165,116,0.06); color: #d4a574; border: 1px solid rgba(212,165,116,0.06); }
        @media (max-width: 600px) {
            .modal-box { padding: 20px; }
            .modal-box .form-row { grid-template-columns: 1fr; }
        }
    </style>

<body>

<div class="container">
    <div class="header">
        <h1>🎯 欲渊之庭</h1>
        <div class="right-actions" id="adminActions">
            <a href="/landing.html#modules-section" class="back-link">← 返回探索</a>
            <button class="btn btn-publish" id="publishBtn" style="display:none;">✨ 发布</button>
            <button class="btn btn-admin" id="manageBtn" style="display:none;">⚙️ 管理</button>
        </div>
    </div>

    <div class="filters" id="filterContainer">
        <button class="filter-btn active" data-category="all">全部</button>
        <button class="filter-btn" data-category="日常任务">日常任务</button>
        <button class="filter-btn" data-category="挑战任务">挑战任务</button>
    </div>

    <div class="task-grid" id="taskGrid">
        <div class="empty-state"><div class="icon">🎯</div><p>加载中…</p></div>
    </div>
</div>

<!-- ===== Modal（发布面板 - 新布局） ===== -->
<div class="modal-overlay" id="editorModal">
    <div class="modal-box">
        <button class="modal-close" id="modalCloseBtn">✕</button>
        <div class="modal-title" id="modalTitle">📝 发布新任务</div>

        <input type="hidden" id="editMode" value="create" />
        <input type="hidden" id="modalSlug" />

        <!-- 第一行：标题 -->
        <div class="form-group">
            <label>标题 *</label>
            <input type="text" id="modalTitleInput" placeholder="任务标题" />
        </div>

        <!-- 第二行：作者 + 分类 -->
        <div class="form-row">
            <div class="form-group">
                <label>作者</label>
                <input type="text" id="modalAuthor" placeholder="作者名称" />
            </div>
            <div class="form-group">
                <label>分类</label>
                <select id="modalCategory">
                    <option value="日常任务">日常任务</option>
                    <option value="挑战任务">挑战任务</option>
                </select>
            </div>
        </div>

        <!-- 第三行：摘要 -->
        <div class="form-group">
            <label>摘要</label>
            <input type="text" id="modalSummary" placeholder="简短描述（可选）" />
        </div>

        <!-- 第四行：封面图 URL -->
        <div class="form-group">
            <label>封面图 URL</label>
            <input type="text" id="modalCover" placeholder="https://example.com/cover.jpg" />
        </div>

        <!-- 第五行：正文 -->
        <div class="form-group">
            <label>正文</label>
            <textarea id="modalEditorTextarea" placeholder="支持 Markdown 语法"></textarea>
        </div>

        <div id="modalStatus"></div>

        <div class="form-actions">
            <button class="btn btn-primary" id="modalSubmitBtn">🚀 发布</button>
            <button class="btn btn-secondary" id="modalCancelBtn">取消</button>
        </div>
    </div>
</div>
