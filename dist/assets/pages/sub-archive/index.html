<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>下位者档案馆</title>
    <link rel="icon" href="/assets/OIP-A-OLsRkys7.jpg" type="image/jpeg" />

    <script type="importmap">
      {
        "imports": {
          "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
        }
      }
    </script>
    <script type="module" crossorigin src="/assets/assets_pages_sub-archive_index-D-bm2Y3W.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/supabase-client-BlgCfJt8.js">
    <link rel="modulepreload" crossorigin href="/assets/api-CAcsciEw.js">
    <link rel="modulepreload" crossorigin href="/assets/utils-CtjtO6eb.js">
    <link rel="modulepreload" crossorigin href="/assets/identity-Be7cwsfl.js">
    <link rel="stylesheet" crossorigin href="/assets/assets_pages_sub-archive_index-CfS-Mmsm.css">
    <link rel="stylesheet" crossorigin href="/assets/global-DUIjPawF.css">
  </head>
  <body>
    <!-- ===== 顶部导航 ===== -->
    <header class="site-header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">
            <img src="/assets/OIP-C-DsxhjT2W.jpg" alt="Foxsir Logo" />
          </span>
          <span class="logo-text">Foxsir<span class="logo-highlight">档案库</span></span>
        </div>
        <div class="header-actions">
          <a href="/" class="btn-home">🏠 首页</a>
          <button class="btn-fill" id="btnFillForm">母の曝光</button>
        </div>
      </div>
    </header>

    <!-- ===== 搜索栏 ===== -->
    <section class="search-section">
      <div class="search-inner">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="搜索姓名、职业或地区…"
            autocomplete="off"
          />
          <span class="search-clear" id="searchClear">✕</span>
        </div>
        <div class="search-stats" id="searchStats">共 <strong>0</strong> 位</div>
      </div>
    </section>

    <!-- ===== 主体 Grid ===== -->
    <main class="main-content">
      <div class="grid-container" id="gridContainer">
        <!-- 卡片由 JavaScript 动态渲染 -->
      </div>

      <div class="state-message" id="stateMessage">
        <div class="loading-spinner"></div>
        <p>加载中…</p>
      </div>

      <div id="loadMoreIndicator" style="text-align:center; padding: 20px 0; color:#94a3b8; display:none; font-size:14px;">
        ⬇ 滚动加载更多...
      </div>
    </main>

  </body>
</html>
