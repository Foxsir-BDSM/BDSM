<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 · Foxsir</title>
    <link rel="icon" href="/assets/images/OIP-A.jpg" type="image/jpeg" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0f0e17;
            color: #fffffe;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image:
                radial-gradient(ellipse at 50% 30%, rgba(212,165,116,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 70%, rgba(212,165,116,0.04) 0%, transparent 50%);
            background-attachment: fixed;
        }
        .auth-wrapper {
            width: 100%;
            max-width: 1000px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 16px;
            color: rgba(255,255,255,0.2);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        .back-link:hover { color: rgba(255,255,255,0.6); }
        #landing-root {
            display: flex;
            border-radius: 32px;
            overflow: hidden;
            min-height: 460px;
            background: rgba(15,14,23,0.5);
            border: 1px solid rgba(255,255,255,0.04);
        }
        #landing-root .brand-section {
            flex: 1;
            padding: 48px 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(15,14,23,0.3);
        }
        #landing-root .brand-section .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        #landing-root .brand-section .logo-wrapper .logo-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid rgba(212,165,116,0.1);
            flex-shrink: 0;
        }
        #landing-root .brand-section .logo-wrapper .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #landing-root .brand-section .logo-wrapper .version {
            font-family: 'Georgia', serif;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #f5d6a8, #d4a574);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }
        #landing-root .brand-section .tagline {
            font-family: 'Georgia', serif;
            font-size: 28px;
            font-weight: 600;
            color: #fffffe;
            margin-bottom: 8px;
            line-height: 1.2;
        }
        #landing-root .brand-section .description {
            font-size: 15px;
            color: rgba(255,255,255,0.4);
            line-height: 1.6;
            margin-bottom: 20px;
        }
        #landing-root .brand-section .features {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        #landing-root .brand-section .features span {
            font-size: 13px;
            color: rgba(255,255,255,0.2);
        }
        #landing-root .auth-section {
            flex: 0 0 380px;
            padding: 40px 36px;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.02);
            border-left: 1px solid rgba(255,255,255,0.04);
        }
        #landing-root .auth-section .auth-card { width: 100%; }
        #landing-root .auth-section .auth-card .tabs {
            display: flex;
            gap: 4px;
            background: rgba(255,255,255,0.02);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 20px;
        }
        #landing-root .auth-section .auth-card .tabs .tab-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.2);
            font-size: 14px;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        #landing-root .auth-section .auth-card .tabs .tab-btn.active {
            background: rgba(212,165,116,0.12);
            color: #d4a574;
        }
        #landing-root .auth-section .auth-card .tabs .tab-btn:hover:not(.active) {
            color: rgba(255,255,255,0.6);
        }
        #landing-root .auth-section .auth-card .auth-form {
            display: none;
            flex-direction: column;
            gap: 14px;
        }
        #landing-root .auth-section .auth-card .auth-form.active { display: flex; }
        #landing-root .auth-section .auth-card .auth-form .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        #landing-root .auth-section .auth-card .auth-form .form-group label {
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
        #landing-root .auth-section .auth-card .auth-form .form-group input,
        #landing-root .auth-section .auth-card .auth-form .form-group select {
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.04);
            background: rgba(255,255,255,0.03);
            color: #fffffe;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }
        #landing-root .auth-section .auth-card .auth-form .form-group input:focus {
            outline: none;
            border-color: rgba(212,165,116,0.2);
        }
        #landing-root .auth-section .auth-card .auth-form .form-group input::placeholder {
            color: rgba(255,255,255,0.1);
        }
        #landing-root .auth-section .auth-card .auth-form .btn-primary {
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #d4a574, #b8946a);
            color: #0f0e17;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            margin-top: 4px;
        }
        #landing-root .auth-section .auth-card .auth-form .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(212,165,116,0.2);
        }
        #landing-root .auth-section .auth-card .auth-form .auth-switch {
            font-size: 13px;
            color: rgba(255,255,255,0.15);
            text-align: center;
            margin-top: 4px;
        }
        #landing-root .auth-section .auth-card .auth-form .auth-switch a {
            color: #d4a574;
            text-decoration: none;
            cursor: pointer;
        }
        #landing-root .auth-section .auth-card .auth-form .auth-switch a:hover {
            text-decoration: underline;
        }
        #landing-root .auth-section .auth-card .message {
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            display: none;
        }
        #landing-root .auth-section .auth-card .message.error {
            display: block;
            background: rgba(239,68,68,0.06);
            color: #f87171;
            border: 1px solid rgba(239,68,68,0.06);
        }
        #landing-root .auth-section .auth-card .message.success {
            display: block;
            background: rgba(34,197,94,0.06);
            color: #22c55e;
            border: 1px solid rgba(34,197,94,0.06);
        }
        @media (max-width: 820px) {
            #landing-root { flex-direction: column; }
            #landing-root .auth-section {
                flex: unset;
                border-left: none;
                border-top: 1px solid rgba(255,255,255,0.04);
                padding: 28px 24px;
            }
            #landing-root .brand-section { padding: 32px 28px; }
            #landing-root .brand-section .tagline { font-size: 22px; }
        }
        @media (max-width: 480px) {
            #landing-root .brand-section { padding: 24px 18px; }
            #landing-root .brand-section .tagline { font-size: 19px; }
            #landing-root .auth-section { padding: 20px 16px; }
        }
    </style>
    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>

  <link rel="modulepreload" crossorigin href="/assets/assets_js_request.js-BophGKQa.js">
  <link rel="modulepreload" crossorigin href="/assets/assets_js_supabase-client.js-CF0gWE4d.js">
  <link rel="modulepreload" crossorigin href="/assets/assets_js_auth.js-CORIovx3.js">
  <link rel="modulepreload" crossorigin href="/assets/assets_js_identity-selector.js-wfIKYf5f.js">
  <link rel="modulepreload" crossorigin href="/assets/assets_js_loading.js-BK0rGq7M.js">

</head>
<body>
    <div class="auth-wrapper">
        <a href="/landing.html" class="back-link">← 返回首页</a>
        <div id="landing-root">
            <!-- 左区：品牌展示 -->
            <div class="brand-section">
                <div class="logo-wrapper">
                    <div class="logo-icon">
                        <img src="/assets/images/OIP-C.jpg" alt="Foxsir" />
                    </div>
                    <span class="version">Foxsir · 欲研社</span>
                </div>
                <h1 class="tagline">欲界之门 · 只渡有缘人</h1>
                <p class="description">
                    为 BDSM 同好打造的私密数字庄园。<br />
                    探索 · 记录 · 连接 · 成长
                </p>
                <div class="features">
                    <span>🔒 隐私至上</span>
                    <span>⚡ 实时互动</span>
                    <span>📜 档案传承</span>
                </div>
            </div>

            <!-- 右区：认证卡片 -->
            <div class="auth-section">
                <div class="auth-card">
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="login">登录</button>
                        <button class="tab-btn" data-tab="register">注册</button>
                    </div>

                    <form id="login-form" class="auth-form active">
                        <div class="form-group">
                            <label for="login-email">邮箱</label>
                            <input type="email" id="login-email" placeholder="you@example.com" required />
                        </div>
                        <div class="form-group">
                            <label for="login-password">密码</label>
                            <input type="password" id="login-password" placeholder="至少 6 位" required />
                        </div>
                        <button type="submit" class="btn-primary">进入欲界</button>
                        <p class="auth-switch">还没有账号？<a href="#" data-switch-to="register">立即注册</a></p>
                    </form>

                    <form id="register-form" class="auth-form">
                        <div class="form-group">
                            <label for="register-email">邮箱</label>
                            <input type="email" id="register-email" placeholder="you@example.com" required />
                        </div>
                        <div class="form-group">
                            <label for="register-nickname">昵称</label>
                            <input type="text" id="register-nickname" placeholder="圈内称呼" required />
                        </div>
                        <div class="form-group" id="identity-selector-container"></div>
                        <div class="form-group">
                            <label for="register-password">密码</label>
                            <input type="password" id="register-password" placeholder="至少 6 位" required />
                        </div>
                        <button type="submit" class="btn-primary">创建账号</button>
                        <p class="auth-switch">已有账号？<a href="#" data-switch-to="login">去登录</a></p>
                    </form>

                    <div id="auth-message" class="message"></div>
                </div>
            </div>
        </div>
    </div>


</body>
</html>
